<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Drop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="stylesheet" href="./tokens.css">
<link rel="stylesheet" href="./app.css">
</head>
<body>
<!--
  The design's markup (Drop Website.dc.html, the <x-dc> body) lives verbatim
  inside this inert <template> — a 1:1 stand-in for the original <x-dc>
  wrapper (both are inert containers the runtime reads from and renders
  into a separate mount point; see app.js's boot()/mount()). No markup was
  rewritten, only relocated from <x-dc> to <template>.
-->
<template id="dc-template">

<div class="drop-scroll">

<sc-if value="{{ showNav }}" hint-placeholder-val="{{ true }}">
  <nav class="wn" style="position:sticky;top:0;z-index:50;">
    <div class="wn__inner">
      <a href="#" onClick="{{ goHome }}" style="font-family:var(--font-display);font-weight:800;font-size:22px;letter-spacing:var(--tr-tight);background:var(--grad-chrome);-webkit-background-clip:text;background-clip:text;color:transparent;display:inline-flex;align-items:center;gap:9px;">
        <span style="width:16px;height:16px;border-radius:50% 50% 50% 2px;transform:rotate(45deg);background:var(--grad-glow);box-shadow:var(--shadow-glow);"></span>DROP
      </a>
      <div class="wn__links">
        <div style="position:relative;">
          <button type="button" onClick="{{ toggleCity }}" class="locchip" style="cursor:pointer;border:1px solid var(--glass-border);background:var(--glass);">
            <span class="dot"></span>{{ city }}<span style="color:var(--text-muted);font-size:10px;">▾</span>
          </button>
          <sc-if value="{{ cityOpen }}">
            <div style="position:absolute;top:44px;left:0;z-index:60;width:250px;background:var(--surface-hi);border:1px solid var(--border-strong);border-radius:var(--r-md);box-shadow:var(--overlay-shadow);padding:var(--sp-xs);">
              <input type="text" value="{{ cityFilter }}" onInput="{{ setCityFilter }}" onKeyDown="{{ cityKey }}" placeholder="Filter or type a city" style="width:100%;height:40px;padding:0 var(--sp-md);margin-bottom:var(--sp-xs);border-radius:var(--r-sm);background:var(--surface-alt);border:1px solid var(--border);color:var(--text);font-family:var(--font-body);font-size:15px;outline:none;" />
              <div style="max-height:248px;overflow-y:auto;">
                <sc-for list="{{ cityList }}" as="c" hint-placeholder-count="6">
                  <button type="button" onClick="{{ c.pick }}" style="display:flex;align-items:center;justify-content:space-between;gap:var(--sp-md);width:100%;text-align:left;padding:9px var(--sp-md);border:0;background:none;color:var(--text);font-family:var(--font-body);font-size:var(--fs-sm);border-radius:var(--r-sm);cursor:pointer;white-space:nowrap;"><span style="display:inline-flex;align-items:center;gap:8px;"><span style="width:6px;height:6px;border-radius:50%;{{ c.dotStyle }}flex:0 0 auto;"></span>{{ c.label }}</span><span style="color:var(--text-muted);font-size:var(--fs-xs);">{{ c.count }}</span></button>
                </sc-for>
                <sc-if value="{{ cityFilterEmpty }}">
                  <div style="padding:9px var(--sp-md);font-size:var(--fs-xs);color:var(--text-muted);">Press Enter to use “{{ cityFilter }}”</div>
                </sc-if>
              </div>
            </div>
          </sc-if>
        </div>
        <div style="position:relative;flex:1;max-width:360px;" class="wn__search-inline">
          <input type="text" placeholder="Search artists, venues, shows" onFocus="{{ onSearchFocus }}" style="width:100%;height:38px;padding:0 var(--sp-lg) 0 38px;border-radius:var(--r-pill);background:var(--glass);border:1px solid var(--glass-border);color:var(--text);font-family:var(--font-body);font-size:var(--fs-sm);outline:none;" />
          <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:14px;">⌕</span>
        </div>
        <a class="wn__link wn__navlink" href="#" onClick="{{ goDiscover }}">Events</a>
        <a class="wn__link wn__navlink" href="#" onClick="{{ goVenues }}">Venues</a>
        <a class="wn__link wn__navlink" href="#" onClick="{{ goArtists }}">Artists</a>
      </div>
      <div class="wn__right">
        <button type="button" class="wn__mobicon" onClick="{{ onSearchFocus }}" aria-label="Search">⌕</button>
        <button type="button" class="wn__mobicon" onClick="{{ toggleNav }}" aria-label="Menu">☰</button>
        <sc-if value="{{ authed }}">
          <span class="wn__bell" style="cursor:pointer;" onClick="{{ goNotifications }}">🔔<span class="wn__badge">3</span></span>
          <div style="position:relative;">
            <button type="button" class="wn__avatar" onClick="{{ toggleMenu }}" style="width:38px;height:38px;border-radius:50%;border:2px solid transparent;background:var(--grad-brand);cursor:pointer;padding:0;background-clip:padding-box;box-shadow:0 0 0 2px var(--accent);"></button>
            <sc-if value="{{ menuOpen }}">
              <div style="position:absolute;top:46px;right:0;z-index:60;min-width:190px;background:var(--surface-hi);border:1px solid var(--border-strong);border-radius:var(--r-md);box-shadow:var(--overlay-shadow);padding:var(--sp-xs);">
                <sc-for list="{{ menuItems }}" as="m" hint-placeholder-count="6">
                  <button type="button" onClick="{{ m.act }}" style="display:block;width:100%;text-align:left;padding:10px var(--sp-md);border:0;background:none;color:{{ m.color }};font-family:var(--font-body);font-size:var(--fs-sm);border-radius:var(--r-sm);cursor:pointer;">{{ m.label }}</button>
                </sc-for>
              </div>
            </sc-if>
          </div>
        </sc-if>
        <sc-if value="{{ signedOut }}">
          <a class="wn__link" href="#" onClick="{{ goLogin }}" style="color:var(--text);">Log in</a>
          <button type="button" class="btn btn--primary btn--sm" onClick="{{ goSignup }}">Get started</button>
        </sc-if>
      </div>
    </div>
  </nav>
  <sc-if value="{{ navOpen }}">
    <div class="mnav">
      <div class="mnav__scrim" onClick="{{ closeNav }}"></div>
      <div class="mnav__panel">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--sp-md);">
          <span style="font-family:var(--font-display);font-weight:800;font-size:16px;letter-spacing:var(--tr-tight);color:var(--text-muted);">MENU</span>
          <button type="button" onClick="{{ closeNav }}" style="width:36px;height:36px;border-radius:50%;background:var(--glass);border:1px solid var(--glass-border);color:var(--text);font-size:16px;cursor:pointer;">✕</button>
        </div>
        <a href="#" class="wn__link" style="color:var(--text);font-size:var(--fs-md);padding:12px 8px;" onClick="{{ navGoDiscover }}">Events</a>
        <a href="#" class="wn__link" style="color:var(--text);font-size:var(--fs-md);padding:12px 8px;" onClick="{{ navGoVenues }}">Venues</a>
        <a href="#" class="wn__link" style="color:var(--text);font-size:var(--fs-md);padding:12px 8px;" onClick="{{ navGoArtists }}">Artists</a>
        <div style="height:1px;background:var(--border);margin:var(--sp-sm) 0;"></div>
        <sc-if value="{{ authed }}">
          <sc-for list="{{ mobileMenu }}" as="m" hint-placeholder-count="6">
            <button type="button" onClick="{{ m.act }}" style="display:flex;align-items:center;gap:12px;width:100%;text-align:left;padding:12px 8px;border:0;background:none;color:{{ m.color }};font-family:var(--font-body);font-size:var(--fs-sm);border-radius:var(--r-sm);cursor:pointer;"><span style="width:20px;">{{ m.icon }}</span>{{ m.label }}</button>
          </sc-for>
        </sc-if>
        <sc-if value="{{ signedOut }}">
          <button type="button" class="btn btn--primary btn--block" style="margin-top:var(--sp-sm);" onClick="{{ navGoSignup }}">Create account</button>
          <button type="button" class="btn btn--ghost btn--block" style="margin-top:var(--sp-sm);" onClick="{{ navGoLogin }}">Log in</button>
        </sc-if>
      </div>
    </div>
  </sc-if>
</sc-if>

<!-- ============ HOME (signed-out) ============ -->
<sc-if value="{{ screenHome }}" hint-placeholder-val="{{ true }}">
  <main>
    <section style="position:relative;overflow:hidden;padding:96px var(--sp-xl) 72px;">
      <div style="position:absolute;width:520px;height:520px;border-radius:50%;background:radial-gradient(circle,rgba(226,77,255,0.5),transparent 62%);top:-160px;right:-80px;filter:blur(30px);animation:floatGlow 9s var(--ease) infinite;pointer-events:none;"></div>
      <div style="position:absolute;width:460px;height:460px;border-radius:50%;background:radial-gradient(circle,rgba(77,226,255,0.42),transparent 62%);bottom:-200px;left:-120px;filter:blur(30px);animation:floatGlow 11s var(--ease) infinite reverse;pointer-events:none;"></div>
      <div style="max-width:1440px;margin:0 auto;position:relative;">
        <div style="max-width:760px;">
          <div class="chip" style="display:inline-flex;margin-bottom:var(--sp-lg);">✦ &nbsp;The EDM show discovery app</div>
          <h1 style="font-family:var(--font-display);font-weight:700;font-size:clamp(42px,6vw,76px);line-height:1.02;letter-spacing:var(--tr-tight);margin:0 0 var(--sp-lg);">Every show.<br>Who's going.<br><span style="background:var(--grad-glow);-webkit-background-clip:text;background-clip:text;color:transparent;">Before you go.</span></h1>
          <p style="font-size:var(--fs-lg);color:var(--text-secondary);line-height:var(--lh-base);max-width:560px;margin:0 0 var(--sp-xl);">Discover every EDM event near you, see which friends are going, lock in your crew, and never miss a drop.</p>
          <div style="display:flex;gap:var(--sp-md);flex-wrap:wrap;align-items:center;">
            <button type="button" class="btn btn--primary" onClick="{{ goSignup }}">Get started — it's free</button>
            <button type="button" class="btn btn--ghost" onClick="{{ goLogin }}">Log in</button>
          </div>
          <div style="display:flex;align-items:center;gap:var(--sp-md);margin-top:var(--sp-xl);color:var(--text-muted);font-size:var(--fs-sm);">
            <div class="avstack">
              <span class="av"></span><span class="av"></span><span class="av"></span><span class="av"></span>
            </div>
            <span>Join <b style="color:var(--text);">40,000+</b> ravers already on Drop</span>
          </div>
        </div>
      </div>
    </section>

    <section style="max-width:1440px;margin:0 auto;padding:0 var(--sp-xl) 64px;">
      <div style="display:flex;align-items:center;justify-content:center;gap:var(--sp-lg);flex-wrap:wrap;margin-bottom:var(--sp-xl);">
        <h2 class="wsh__title m-wrap" style="font-size:var(--fs-xxl);margin:0;white-space:nowrap;">Happening in {{ city }}</h2>
        <div class="home-search" style="position:relative;flex:1;min-width:260px;max-width:420px;">
          <input type="text" placeholder="Search shows, artists, venues near you" onFocus="{{ onSearchFocus }}" style="width:100%;height:48px;padding:0 var(--sp-lg) 0 44px;border-radius:var(--r-pill);background:var(--surface);border:1px solid var(--border-strong);color:var(--text);font-family:var(--font-body);font-size:16px;outline:none;text-align:left;" />
          <span style="position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--accent);font-size:16px;">⌕</span>
        </div>
      </div>
      <div class="wsh__grid" style="justify-content:center;">
        <sc-for list="{{ events }}" as="ev" hint-placeholder-count="8">
          <div class="wsc">
            <a class="wsc__card" href="#" onClick="{{ ev.open }}">
              <div class="wsc__img" style="{{ ev.gradStyle }}"></div>
              <div class="wsc__scrim"></div>
              <span class="wsc__price">{{ ev.price }}</span>
              <span style="position:absolute;top:var(--sp-md);left:var(--sp-md);background:var(--glass-dark);border:1px solid var(--glass-border);padding:5px var(--sp-md);border-radius:var(--r-pill);color:var(--text);font-family:var(--font-body);font-size:var(--fs-xs);font-weight:var(--fw-bold);letter-spacing:0.1em;text-transform:uppercase;">{{ ev.genre }}</span><sc-if value="{{ ev.hasFriends }}"><span class="wsc__friends" style="top:calc(var(--sp-md) + 36px);">👥 {{ ev.friendsLabel }}</span></sc-if>
              <div class="wsc__text">
                <div class="wsc__date">{{ ev.dateShort }}</div>
                <div class="wsc__title">{{ ev.title }}</div>
                <div class="wsc__venue">{{ ev.venueCity }}</div>
              </div>
            </a>
          </div>
        </sc-for>
      </div>
      <sc-if value="{{ homeEmpty }}">
        <div class="empty">
          <div class="empty__ico">🎧</div>
          <div class="empty__title">No shows in {{ city }} yet — shows coming soon</div>
          <div class="empty__body">We’re adding cities fast. Head back to Denver to see what’s dropping, or help us fill this one in.</div>
          <div style="display:flex;gap:var(--sp-sm);justify-content:center;flex-wrap:wrap;">
            <button type="button" class="btn btn--ghost btn--sm" onClick="{{ cityToDenver }}">Back to Denver</button>
            <button type="button" class="btn btn--secondary btn--sm" onClick="{{ goSuggest }}">Know of one? Suggest an event</button>
          </div>
        </div>
      </sc-if>
    </section>
  </main>
</sc-if>

<!-- ============ LOGIN ============ -->
<sc-if value="{{ screenLogin }}">
  <main class="auth-main" style="display:flex;min-height:100vh;">
    <div class="auth-brand" style="flex:1;position:relative;overflow:hidden;background:linear-gradient(150deg,#1a0f2e,#0b0d12 60%);display:flex;flex-direction:column;justify-content:space-between;padding:56px 48px;">
      <div style="position:absolute;width:480px;height:480px;border-radius:50%;background:radial-gradient(circle,rgba(226,77,255,0.4),transparent 62%);top:-120px;left:-80px;filter:blur(20px);"></div>
      <a href="#" onClick="{{ goHome }}" style="position:relative;font-family:var(--font-display);font-weight:800;font-size:22px;letter-spacing:var(--tr-tight);background:var(--grad-chrome);-webkit-background-clip:text;background-clip:text;color:transparent;display:inline-flex;align-items:center;gap:9px;">
        <span style="width:16px;height:16px;border-radius:50% 50% 50% 2px;transform:rotate(45deg);background:var(--grad-glow);box-shadow:var(--shadow-glow);"></span>DROP
      </a>
      <div class="auth-hero" style="position:relative;">
        <h2 style="font-family:var(--font-display);font-weight:700;font-size:44px;line-height:1.05;letter-spacing:var(--tr-tight);margin:0 0 var(--sp-lg);max-width:420px;">Every show. Who's going. Before you go.</h2>
        <div style="display:flex;align-items:flex-end;gap:3px;height:64px;margin-top:var(--sp-xl);">
          <sc-for list="{{ waveBars }}" as="b" hint-placeholder-count="40">
            <span style="width:5px;flex:0 0 5px;border-radius:var(--r-pill);background:var(--grad-glow);transform-origin:bottom;height:100%;animation:wavebar 1.3s var(--ease) infinite;{{ b.style }}"></span>
          </sc-for>
        </div>
      </div>
      <div class="auth-foot" style="position:relative;color:var(--text-muted);font-size:var(--fs-sm);">© Resonance Ventures LLC</div>
    </div>
    <div class="auth-form" style="flex:1;display:flex;align-items:center;justify-content:center;padding:48px var(--sp-xl);">
      <div style="width:100%;max-width:400px;">
        <h1 style="font-family:var(--font-display);font-weight:700;font-size:var(--fs-xxl);letter-spacing:var(--tr-snug);margin:0 0 var(--sp-xs);">Welcome back</h1>
        <p style="color:var(--text-secondary);margin:0 0 var(--sp-xl);">Log in to RSVP, save shows and find your crew.</p>
        <label style="display:block;font-size:var(--fs-sm);color:var(--text-secondary);margin-bottom:6px;">Email or username</label>
        <input id="login-email" type="text" placeholder="you@example.com" style="width:100%;height:52px;padding:0 var(--sp-lg);margin-bottom:var(--sp-lg);border-radius:var(--r-md);background:var(--surface-alt);border:1px solid var(--border);color:var(--text);font-family:var(--font-body);font-size:var(--fs-md);outline:none;" />
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;">
          <label style="font-size:var(--fs-sm);color:var(--text-secondary);">Password</label>
          <a href="#" onClick="{{ goForgot }}" style="font-size:var(--fs-xs);">Forgot?</a>
        </div>
        <input id="login-password" type="password" placeholder="••••••••" style="width:100%;height:52px;padding:0 var(--sp-lg);margin-bottom:var(--sp-md);border-radius:var(--r-md);background:var(--surface-alt);border:1px solid var(--border);color:var(--text);font-family:var(--font-body);font-size:var(--fs-md);outline:none;" />
        <sc-if value="{{ authError }}"><div style="color:var(--danger);font-size:var(--fs-sm);margin-bottom:var(--sp-md);">{{ authError }}</div></sc-if>
        <button type="button" class="btn btn--primary btn--block" onClick="{{ doLogin }}" disabled="{{ authBusy }}">{{ loginBtnLabel }}</button>
        <div style="display:flex;align-items:center;gap:var(--sp-md);margin:var(--sp-xl) 0;color:var(--text-muted);font-size:var(--fs-xs);">
          <span style="flex:1;height:1px;background:var(--border);"></span>OR<span style="flex:1;height:1px;background:var(--border);"></span>
        </div>
        <div style="display:flex;flex-direction:column;gap:var(--sp-md);">
          <button type="button" class="btn btn--secondary btn--block" onClick="{{ oauthGoogle }}">Continue with Google</button>
          <button type="button" class="btn btn--secondary btn--block" onClick="{{ oauthApple }}">Continue with Apple</button>
          <button type="button" class="btn btn--secondary btn--block" onClick="{{ oauthFacebook }}">Continue with Facebook</button>
        </div>
        <p style="text-align:center;color:var(--text-secondary);font-size:var(--fs-sm);margin-top:var(--sp-xl);">New to Drop? <a href="#" onClick="{{ goSignup }}">Create one</a></p>
      </div>
    </div>
  </main>
</sc-if>

<!-- ============ SIGNUP ============ -->
<sc-if value="{{ screenSignup }}">
  <main class="auth-main" style="display:flex;min-height:100vh;">
    <div class="auth-brand" style="flex:1;position:relative;overflow:hidden;background:linear-gradient(150deg,#0f2e29,#0b0d12 60%);display:flex;flex-direction:column;justify-content:space-between;padding:56px 48px;">
      <div style="position:absolute;width:480px;height:480px;border-radius:50%;background:radial-gradient(circle,rgba(77,226,255,0.4),transparent 62%);top:-120px;left:-80px;filter:blur(20px);"></div>
      <a href="#" onClick="{{ goHome }}" style="position:relative;font-family:var(--font-display);font-weight:800;font-size:22px;letter-spacing:var(--tr-tight);background:var(--grad-chrome);-webkit-background-clip:text;background-clip:text;color:transparent;display:inline-flex;align-items:center;gap:9px;">
        <span style="width:16px;height:16px;border-radius:50% 50% 50% 2px;transform:rotate(45deg);background:var(--grad-glow);box-shadow:var(--shadow-glow);"></span>DROP
      </a>
      <div class="auth-hero" style="position:relative;">
        <h2 style="font-family:var(--font-display);font-weight:700;font-size:40px;line-height:1.05;letter-spacing:var(--tr-tight);margin:0 0 var(--sp-lg);max-width:440px;">Your scene, organized.</h2>
        <ul style="list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:var(--sp-md);color:var(--text-secondary);font-size:var(--fs-md);">
          <li style="display:flex;gap:10px;"><span style="color:var(--attended);">✓</span> Track every show near you</li>
          <li style="display:flex;gap:10px;"><span style="color:var(--attended);">✓</span> See which friends are going</li>
          <li style="display:flex;gap:10px;"><span style="color:var(--attended);">✓</span> All-in ticket prices, compared</li>
          <li style="display:flex;gap:10px;"><span style="color:var(--attended);">✓</span> Build your crew & make plans</li>
        </ul>
      </div>
      <div class="auth-foot" style="position:relative;color:var(--text-muted);font-size:var(--fs-sm);">© Resonance Ventures LLC</div>
    </div>
    <div class="auth-form" style="flex:1;display:flex;align-items:center;justify-content:center;padding:48px var(--sp-xl);">
      <div style="width:100%;max-width:400px;">
        <h1 style="font-family:var(--font-display);font-weight:700;font-size:var(--fs-xxl);letter-spacing:var(--tr-snug);margin:0 0 var(--sp-xs);">Create your account</h1>
        <p style="color:var(--text-secondary);margin:0 0 var(--sp-xl);">Free forever. 16+ only.</p>
        <label style="display:block;font-size:var(--fs-sm);color:var(--text-secondary);margin-bottom:6px;">Email</label>
        <input id="signup-email" type="email" placeholder="you@example.com" style="width:100%;height:52px;padding:0 var(--sp-lg);margin-bottom:var(--sp-lg);border-radius:var(--r-md);background:var(--surface-alt);border:1px solid var(--border);color:var(--text);font-family:var(--font-body);font-size:var(--fs-md);outline:none;" />
        <label style="display:block;font-size:var(--fs-sm);color:var(--text-secondary);margin-bottom:6px;">Username</label>
        <div style="position:relative;margin-bottom:var(--sp-lg);">
          <input type="text" value="{{ username }}" onInput="{{ setUsername }}" placeholder="raver_name" style="width:100%;height:52px;padding:0 44px 0 var(--sp-lg);border-radius:var(--r-md);background:var(--surface-alt);border:1px solid {{ unameBorder }};color:var(--text);font-family:var(--font-body);font-size:var(--fs-md);outline:none;" />
          <span style="position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:16px;">{{ unameIcon }}</span>
        </div>
        <sc-if value="{{ unameMsg }}"><div style="font-size:var(--fs-xs);color:{{ unameMsgColor }};margin-top:-8px;margin-bottom:var(--sp-lg);">{{ unameMsg }}</div></sc-if>
        <label style="display:block;font-size:var(--fs-sm);color:var(--text-secondary);margin-bottom:6px;">Date of birth</label>
        <input id="signup-dob" type="date" style="width:100%;height:52px;padding:0 var(--sp-lg);margin-bottom:var(--sp-lg);border-radius:var(--r-md);background:var(--surface-alt);border:1px solid var(--border);color:var(--text);font-family:var(--font-body);font-size:var(--fs-md);outline:none;color-scheme:dark;" />
        <label style="display:block;font-size:var(--fs-sm);color:var(--text-secondary);margin-bottom:6px;">Password</label>

<!-- ============ DISCOVER (signed-in) ============ -->
<sc-if value="{{ screenDiscover }}">
  <main class="wsh">
    <div class="wsh__content">
      <div class="wsh__headrow">
        <div class="wsh__title">Discover</div>
        <div class="wsh__controls disc-controls">
          <div class="seg">
            <sc-for list="{{ tabs }}" as="t" hint-placeholder-count="3">
              <div class="seg__item {{ t.cls }}" onClick="{{ t.pick }}">{{ t.label }}</div>
            </sc-for>
          </div>
        </div>
      </div>

      <div class="m-rail" style="display:flex;gap:var(--sp-sm);flex-wrap:wrap;">
        <sc-for list="{{ dateChips }}" as="d" hint-placeholder-count="3">
          <button type="button" class="chip {{ d.cls }}" onClick="{{ d.pick }}"><span class="chip__dot"></span>{{ d.label }}</button>

      </div>

      <!-- Festival promo banner -->
      <a href="#" onClick="{{ goFestival }}" style="position:relative;overflow:hidden;display:flex;align-items:center;gap:var(--sp-lg);border-radius:var(--r-lg);border:1px solid var(--border-strong);padding:var(--sp-lg) var(--sp-xl);background:linear-gradient(120deg,#2b1c4d,#0d3b52 55%,#143a22);flex-wrap:wrap;">

          <div class="wsc__date">SAT–SUN · JUL 26–27</div>
          <div style="font-family:var(--font-display);font-weight:700;font-size:var(--fs-xl);letter-spacing:var(--tr-snug);">Global Dance Festival 2026</div>
          <div style="color:var(--text-secondary);font-size:var(--fs-sm);">4 stages · 38 sets · build your set-time schedule</div>
        </div>
        <span class="btn btn--primary btn--sm" style="position:relative;">View schedule</span>
      </a>

      <!-- Pick your night (genre filter) -->
      <div class="sec" style="padding:var(--sp-md) 0 var(--sp-sm);">
        <div class="sec__title">Pick your night</div>
        <sc-if value="{{ genreActive }}"><a href="#" class="sec__more" onClick="{{ clearGenre }}">Clear filter</a></sc-if>
      </div>
      <div class="genre-carousel">
        <button type="button" class="genre-arrow" id="genrePrev" aria-label="Scroll genres left" onClick="{{ genrePrev }}">‹</button>
        <div class="m-rail m-rail-tile genre-rail" id="genreRail" style="gap:var(--sp-md);">
          <sc-for list="{{ genres }}" as="g" hint-placeholder-count="6">
            <button type="button" onClick="{{ g.pick }}" style="position:relative;height:96px;border-radius:var(--r-md);overflow:hidden;display:flex;align-items:flex-end;padding:var(--sp-md);cursor:pointer;text-align:left;{{ g.tileStyle }}">
              <span style="position:absolute;inset:0;background:linear-gradient(180deg,transparent,rgba(11,13,18,0.7));"></span>
              <span style="position:relative;font-family:var(--font-display);font-weight:700;font-size:var(--fs-md);letter-spacing:var(--tr-snug);color:var(--text);">{{ g.name }}</span>
            </button>
          </sc-for>
        </div>
        <button type="button" class="genre-arrow" id="genreNext" aria-label="Scroll genres right" onClick="{{ genreNext }}">›</button>
      </div>

      <!-- Crew rail (signed-in) -->
      <sc-if value="{{ authed }}">
      <div>
        <div class="sec" style="padding:var(--sp-xl) 0 var(--sp-md);">
          <div class="sec__title">Your crew</div>
          <a href="#" class="sec__more" onClick="{{ goCrew }}">Find friends</a>
        </div>
        <div style="display:flex;gap:var(--sp-lg);overflow-x:auto;padding-bottom:var(--sp-xs);">
          <sc-for list="{{ crew }}" as="f" hint-placeholder-count="6">
            <div style="display:flex;flex-direction:column;align-items:center;gap:6px;flex:0 0 auto;width:68px;">
              <span style="width:56px;height:56px;border-radius:50%;background:var(--grad-brand);border:2px solid var(--surface);box-shadow:0 0 0 2px {{ f.ring }};"></span>
              <span style="font-size:var(--fs-xs);color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:68px;">{{ f.name }}</span>
            </div>
          </sc-for>
          <div style="display:flex;flex-direction:column;align-items:center;gap:6px;flex:0 0 auto;width:68px;cursor:pointer;" onClick="{{ goInvite }}">
            <span style="width:56px;height:56px;border-radius:50%;background:var(--glass);border:1px dashed var(--border-strong);display:flex;align-items:center;justify-content:center;color:var(--accent);font-size:24px;">+</span>
            <span style="font-size:var(--fs-xs);color:var(--text-muted);">Invite</span>
          </div>
        </div>
      </div>
      </sc-if>

      <!-- Crew empty (signed-out) -->
      <sc-if value="{{ signedOut }}">
      <div style="display:flex;align-items:center;gap:var(--sp-lg);padding:var(--sp-lg) var(--sp-xl);margin-top:var(--sp-xl);background:var(--social-glass);border:1px solid var(--social-glass-border);border-radius:var(--r-lg);flex-wrap:wrap;">
        <div class="avstack" style="flex:0 0 auto;"><span class="av"></span><span class="av"></span><span class="av"></span></div>
        <div style="flex:1;min-width:220px;">
          <div style="font-family:var(--font-display);font-weight:700;font-size:var(--fs-lg);">Find your crew</div>
          <div style="color:var(--text-secondary);font-size:var(--fs-sm);">See which friends are going, make plans, and never rave alone. Free to join.</div>
        </div>
        <button type="button" class="btn btn--primary btn--sm" onClick="{{ goSignup }}">Find friends</button>
      </div>
      </sc-if>

      <!-- Main grid -->
      <div class="sec" style="padding:var(--sp-xl) 0 var(--sp-sm);">
        <div class="sec__title">{{ gridLabel }}</div>
        <a href="#" class="sec__more" onClick="{{ noop }}">See all</a>
      </div>
      <sc-if value="{{ loading }}">
        <div class="wsh__grid" style="justify-content:center;">
          <sc-for list="{{ skelCards }}" as="k" hint-placeholder-count="8">
            <div class="wsc">
              <div class="skel" style="aspect-ratio:3/4;border-radius:var(--r-lg);"></div>
              <div style="display:flex;gap:var(--sp-sm);margin-top:var(--sp-sm);"><div class="skel" style="flex:1;height:34px;border-radius:var(--r-pill);"></div><div class="skel" style="flex:1;height:34px;border-radius:var(--r-pill);"></div></div>
            </div>
          </sc-for>
        </div>
      </sc-if>
      <sc-if value="{{ contentReady }}">
      <div class="wsh__grid" style="justify-content:center;">
        <sc-for list="{{ discoverEvents }}" as="ev" hint-placeholder-count="8">
          <div class="wsc">
            <a class="wsc__card" href="#" onClick="{{ ev.open }}">
              <div class="wsc__img" style="{{ ev.gradStyle }}"></div>
              <div class="wsc__scrim"></div>
              <span class="wsc__price">{{ ev.price }}</span>
              <span style="position:absolute;top:var(--sp-md);left:var(--sp-md);background:var(--glass-dark);border:1px solid var(--glass-border);padding:5px var(--sp-md);border-radius:var(--r-pill);color:var(--text);font-family:var(--font-body);font-size:var(--fs-xs);font-weight:var(--fw-bold);letter-spacing:0.1em;text-transform:uppercase;">{{ ev.genre }}</span><sc-if value="{{ ev.hasFriends }}"><span class="wsc__friends" style="top:calc(var(--sp-md) + 36px);">👥 {{ ev.friendsLabel }}</span></sc-if>
              <div class="wsc__text">
                <div class="wsc__date">{{ ev.dateShort }}</div>
                <div class="wsc__title">{{ ev.title }}</div>
                <div class="wsc__venue">{{ ev.venueCity }}</div>
              </div>
            </a>
            <div class="wsc__actions">
              <button type="button" class="{{ ev.goingCls }}" onClick="{{ ev.going }}">✓ Going</button>
              <button type="button" class="{{ ev.interestedCls }}" onClick="{{ ev.interested }}">{{ ev.interestedGlyph }} Interested</button>
              <button type="button" class="wsc__share" aria-label="Share" onClick="{{ ev.share }}">↗</button>
            </div>
          </div>
        </sc-for>
      </div>

      <sc-if value="{{ gridEmpty }}">
        <div class="empty">
          <div class="empty__ico">🎧</div>
          <div class="empty__title">No {{ genreName }} shows in {{ city }} yet — shows coming soon</div>
          <div class="empty__body">We’re adding cities fast. Switch back to Denver, try another genre, or help us fill this one in.</div>
          <div style="display:flex;gap:var(--sp-sm);justify-content:center;flex-wrap:wrap;">
            <button type="button" class="btn btn--ghost btn--sm" onClick="{{ cityToDenver }}">Back to Denver</button>
            <button type="button" class="btn btn--secondary btn--sm" onClick="{{ goSuggest }}">Know of one? Suggest an event</button>
          </div>
        </div>
      </sc-if>
      </sc-if>
    </div>
  </main>
</sc-if>

<!-- ============ EVENT DETAIL ============ -->
<sc-if value="{{ screenEvent }}">
  <main class="wsh">
    <div class="ed-wrap" style="max-width:1440px;margin:0 auto;padding:var(--sp-lg) var(--sp-xl) var(--sp-xxxl);">
      <a href="#" onClick="{{ goDiscover }}" style="display:inline-flex;align-items:center;gap:6px;color:var(--text-secondary);font-size:var(--fs-sm);margin-bottom:var(--sp-lg);">← Back to discover</a>
      <sc-if value="{{ loading }}">
        <div class="ed-grid" style="display:grid;grid-template-columns:1fr 360px;gap:var(--sp-xxl);align-items:start;">
          <div>
            <div class="skel" style="height:360px;border-radius:var(--r-xl);margin-bottom:var(--sp-lg);"></div>
            <div class="skel" style="height:24px;width:60%;margin-bottom:var(--sp-md);"></div>
            <div class="skel" style="height:16px;width:100%;margin-bottom:8px;"></div>
            <div class="skel" style="height:16px;width:90%;margin-bottom:8px;"></div>
            <div class="skel" style="height:16px;width:75%;"></div>
          </div>
          <div class="skel" style="height:320px;border-radius:var(--r-xl);"></div>
        </div>
      </sc-if>
      <sc-if value="{{ contentReady }}">
      <div class="ed-grid" style="display:grid;grid-template-columns:1fr 360px;gap:var(--sp-xxl);align-items:start;">

        <div>
          <div style="position:relative;height:360px;border-radius:var(--r-xl);overflow:hidden;border:1px solid var(--border);{{ ae.gradStyle }}">
            <div style="position:absolute;inset:0;background:var(--scrim);"></div>
            <div style="position:absolute;top:var(--sp-lg);right:var(--sp-lg);display:flex;gap:var(--sp-sm);">
              <button type="button" onClick="{{ aeSave }}" class="{{ aeSaveCls }}" style="width:44px;height:44px;border-radius:50%;background:var(--glass-dark);border:1px solid var(--glass-border);color:var(--text);font-size:18px;cursor:pointer;backdrop-filter:blur(8px);">{{ aeSaveGlyph }}</button>
              <button type="button" onClick="{{ aeShare }}" style="width:44px;height:44px;border-radius:50%;background:var(--glass-dark);border:1px solid var(--glass-border);color:var(--text);font-size:16px;cursor:pointer;backdrop-filter:blur(8px);">↗</button>
            </div>
            <sc-if value="{{ ae.presaleLive }}"><span class="ec__sale is-presale" style="position:absolute;top:var(--sp-lg);left:var(--sp-lg);">◆ PRESALE LIVE</span></sc-if>
            <div style="position:absolute;left:0;right:0;bottom:0;padding:var(--sp-xl);">
              <div class="wsc__date" style="font-size:var(--fs-sm);">{{ ae.dateShort }}</div>
              <h1 style="font-family:var(--font-display);font-weight:700;font-size:clamp(28px,4vw,44px);letter-spacing:var(--tr-tight);line-height:1.05;margin:6px 0 8px;">{{ ae.title }}</h1>
              <div style="color:var(--text-secondary);font-size:var(--fs-md);">{{ ae.venueCity }}</div>
            </div>
          </div>

          <!-- facts row -->
          <div style="display:flex;flex-wrap:wrap;gap:var(--sp-xl);padding:var(--sp-xl) 0;border-bottom:1px solid var(--border);">
            <div class="metric"><span class="metric__label">Date & time</span><span style="font-family:var(--font-display);font-weight:700;font-size:var(--fs-md);">{{ ae.dateLong }}</span></div>
            <div class="metric"><span class="metric__label">Venue</span><a href="#" onClick="{{ aeOpenVenue }}" style="font-family:var(--font-display);font-weight:700;font-size:var(--fs-md);">{{ ae.venue }}</a></div>
            <div class="metric"><span class="metric__label">Going</span><span class="metric__value" style="font-size:var(--fs-xl);color:var(--going);">{{ ae.goingCount }}</span></div>
            <div class="metric"><span class="metric__label">Interested</span><span class="metric__value" style="font-size:var(--fs-xl);color:var(--interested);">{{ ae.interestedCount }}</span></div>
          </div>

          <!-- friends going wedge -->
          <sc-if value="{{ ae.hasFriends }}">
            <div style="display:flex;align-items:center;gap:var(--sp-md);margin:var(--sp-xl) 0;padding:var(--sp-md) var(--sp-lg);background:var(--social-glass);border:1px solid var(--social-glass-border);border-radius:var(--r-md);">

              <span style="color:var(--accent);font-weight:700;font-size:var(--fs-sm);">{{ ae.friendsLabel }} going</span>

              <div><div style="font-size:var(--fs-xs);color:var(--gold);font-weight:700;letter-spacing:var(--tr-wide);">PRESALE CODE · LIVE NOW</div><div style="font-family:var(--font-display);font-weight:700;font-size:var(--fs-xl);letter-spacing:2px;">{{ ae.presaleCode }}</div></div>

            </div>

          <!-- lineup -->

            <div class="sec__title" style="margin-bottom:var(--sp-md);">Lineup</div>
            <div style="display:flex;flex-wrap:wrap;gap:var(--sp-sm);">

          </div>

            <div style="display:flex;gap:var(--sp-sm);">

    </div>
    <sc-if value="{{ contentReady }}">

<!-- ============ SEARCH RESULTS ============ -->

                    <button type="button" onClick="{{ g.pick }}" style="display:flex;align-items:center;gap:var(--sp-md);width:100%;text-align:left;padding:9px var(--sp-md);border:0;background:none;color:var(--text);font-family:var(--font-body);font-size:var(--fs-sm);border-radius:var(--r-sm);cursor:pointer;"><span style="width:20px;height:20px;border-radius:6px;border:1px solid var(--glass-border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;flex:0 0 auto;{{ g.checkStyle }}">{{ g.checkGlyph }}</span><span style="flex:1;">{{ g.name }}</span><span style="color:var(--text-muted);font-size:var(--fs-xs);">{{ g.count }}</span></button>

              </div>
            </sc-if>

          <div style="font-size:var(--fs-xs);color:var(--text-muted);text-transform:uppercase;letter-spacing:var(--tr-wide);margin-bottom:var(--sp-sm);">City</div>
          <div style="position:relative;margin-bottom:var(--sp-xl);">
            <button type="button" onClick="{{ toggleSCity }}" style="width:100%;display:flex;align-items:center;justify-content:space-between;gap:var(--sp-sm);height:48px;padding:0 var(--sp-lg);border-radius:var(--r-pill);background:var(--glass);border:1px solid var(--glass-border);color:var(--text);font-family:var(--font-body);font-size:var(--fs-sm);cursor:pointer;"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">{{ searchCityLabel }}</span><span style="width:8px;height:8px;border-right:2px solid var(--text-muted);border-bottom:2px solid var(--text-muted);transform:rotate(45deg);margin-top:-3px;flex:0 0 auto;"></span></button>

                  </sc-for>
                  <sc-if value="{{ searchCityEmptyList }}"><div style="padding:9px var(--sp-md);font-size:var(--fs-xs);color:var(--text-muted);">No cities match</div></sc-if>
                </div>
              </div>
            </sc-if>
          </div>
          <div style="font-size:var(--fs-xs);color:var(--text-muted);text-transform:uppercase;letter-spacing:var(--tr-wide);margin-bottom:var(--sp-sm);">Venue</div>
          <div style="position:relative;margin-bottom:var(--sp-xl);">
            <button type="button" onClick="{{ toggleSVenue }}" style="width:100%;display:flex;align-items:center;justify-content:space-between;gap:var(--sp-sm);height:48px;padding:0 var(--sp-lg);border-radius:var(--r-pill);background:var(--glass);border:1px solid var(--glass-border);color:var(--text);font-family:var(--font-body);font-size:var(--fs-sm);cursor:pointer;"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">{{ searchVenueLabel }}</span><span style="width:8px;height:8px;border-right:2px solid var(--text-muted);border-bottom:2px solid var(--text-muted);transform:rotate(45deg);margin-top:-3px;flex:0 0 auto;"></span></button>
            <sc-if value="{{ searchVenueOpen }}">
              <div style="position:absolute;top:calc(100% + 6px);left:0;right:0;z-index:30;background:var(--surface-hi);border:1px solid var(--border-strong);border-radius:var(--r-md);box-shadow:var(--overlay-shadow);padding:var(--sp-xs);">

                  <button type="button" onClick="{{ sVenueAll }}" style="display:block;width:100%;text-align:left;padding:9px var(--sp-md);border:0;background:none;color:var(--text);font-family:var(--font-body);font-size:var(--fs-sm);border-radius:var(--r-sm);cursor:pointer;">All venues</button>

                  </sc-for>
                  <sc-if value="{{ searchVenueEmptyList }}"><div style="padding:9px var(--sp-md);font-size:var(--fs-xs);color:var(--text-muted);">No venues match</div></sc-if>

          <button type="button" class="btn btn--ghost btn--block btn--sm" onClick="{{ clearFilters }}">Clear all</button>

              <sc-for list="{{ skelCards }}" as="k" hint-placeholder-count="6">

              </sc-for>
            </div>

          <sc-if value="{{ contentReady }}">
          <sc-if value="{{ searchEmpty }}">
            <div style="margin-bottom:var(--sp-xxl);">
              <div class="sec__title" style="margin-bottom:var(--sp-md);">Recent searches</div>

                </sc-for>

              <div style="display:flex;gap:var(--sp-sm);flex-wrap:wrap;">
                <sc-for list="{{ trendingChips }}" as="t" hint-placeholder-count="6">
                  <button type="button" class="chip" onClick="{{ t.pick }}"><span class="chip__dot"></span>{{ t.label }}</button>
                </sc-for>
              </div>
            </div>
          </sc-if>
          <sc-if value="{{ searchHasResults }}">
            <div class="sec" style="padding:0 0 var(--sp-md);">
              <div class="sec__title">{{ resultsLabel }}</div>
            </div>
            <div class="wsh__grid">
              <sc-for list="{{ searchResults }}" as="ev" hint-placeholder-count="6">
                <div class="wsc">
                  <a class="wsc__card" href="#" onClick="{{ ev.open }}">

                    <span style="position:absolute;top:var(--sp-md);left:var(--sp-md);background:var(--glass-dark);border:1px solid var(--glass-border);padding:5px var(--sp-md);border-radius:var(--r-pill);color:var(--text);font-family:var(--font-body);font-size:var(--fs-xs);font-weight:var(--fw-bold);letter-spacing:0.1em;text-transform:uppercase;">{{ ev.genre }}</span>
                    <span class="wsc__price">{{ ev.price }}</span>
                    <sc-if value="{{ ev.hasFriends }}"><span class="wsc__friends" style="top:calc(var(--sp-md) + 36px);">👥 {{ ev.friendsLabel }}</span></sc-if>
                    <div class="wsc__text">
                      <div class="wsc__date">{{ ev.dateShort }}</div>
                      <div class="wsc__title">{{ ev.title }}</div>
                      <div class="wsc__venue">{{ ev.venueCity }}</div>
                    </div>
                  </a>
                </div>
              </sc-for>
            </div>
          </sc-if>
          <sc-if value="{{ searchNoResults }}">

              <div class="empty__ico">🔦</div>
              <div class="empty__title">No matches for "{{ query }}"</div>
              <div class="empty__body">Try a different spelling, widen your filters, or browse trending genres.</div>
              <button type="button" class="btn btn--ghost btn--sm" onClick="{{ clearFilters }}">Reset filters</button>
            </div>
          </sc-if>
          </sc-if>
        </div>
      </div>
    </div>
  </main>

<!-- ============ FESTIVAL SCHEDULE ============ -->

                    <sc-if value="{{ se.hasFriends }}"><div style="font-size:var(--fs-xs);color:var(--accent);margin-top:2px;">👥 {{ se.friendsLabel }}</div></sc-if>
                  </div>
                  <button type="button" onClick="{{ se.star }}" style="width:40px;height:40px;border-radius:50%;background:{{ se.starBg }};border:1px solid {{ se.starBorder }};color:{{ se.starColor }};font-size:18px;cursor:pointer;flex:0 0 auto;">{{ se.starGlyph }}</button>
                </div>
              </sc-for>
            </div>
          </div>
        </sc-for>
      </div>
    </div>
  </main>
</sc-if>

<!-- ============ ACTIVATION WIZARD ============ -->
<sc-if value="{{ screenActivation }}">
  <main class="wiz-main" style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:var(--sp-xxl) var(--sp-xl);position:relative;overflow:hidden;">
    <div style="position:absolute;width:520px;height:520px;border-radius:50%;background:radial-gradient(circle,rgba(226,77,255,0.28),transparent 62%);top:-180px;left:-80px;filter:blur(40px);pointer-events:none;"></div>
    <div style="position:absolute;width:460px;height:460px;border-radius:50%;background:radial-gradient(circle,rgba(77,226,255,0.24),transparent 62%);bottom:-200px;right:-100px;filter:blur(40px);pointer-events:none;"></div>
    <div style="position:relative;width:100%;max-width:520px;">
      <!-- progress dots -->
      <div style="display:flex;gap:8px;justify-content:center;margin-bottom:var(--sp-xxl);">
        <sc-for list="{{ wizDots }}" as="d" hint-placeholder-count="5">
          <span style="height:6px;border-radius:var(--r-pill);transition:all var(--dur-base) var(--ease);{{ d.style }}"></span>
        </sc-for>
      </div>
      <div class="wiz-card" style="background:var(--surface);border:1px solid var(--border-strong);border-radius:var(--r-xl);padding:var(--sp-xxl);box-shadow:var(--shadow-card);">
        <div style="font-size:var(--fs-xs);color:var(--accent);font-weight:700;letter-spacing:var(--tr-wide);text-transform:uppercase;margin-bottom:var(--sp-sm);">Step {{ wizStepNum }} of 5</div>
        <h1 style="font-family:var(--font-display);font-weight:700;font-size:var(--fs-xxl);letter-spacing:var(--tr-snug);margin:0 0 var(--sp-xs);">{{ wizTitle }}</h1>
        <p style="color:var(--text-secondary);margin:0 0 var(--sp-xl);">{{ wizSubtitle }}</p>

        <!-- Step 0: profile -->
        <sc-if value="{{ wizStep0 }}">
          <div style="display:flex;flex-direction:column;align-items:center;gap:var(--sp-md);margin-bottom:var(--sp-xl);">
            <div style="width:96px;height:96px;border-radius:50%;background:var(--grad-glow-fill);box-shadow:0 0 0 3px var(--accent);display:flex;align-items:center;justify-content:center;font-size:32px;">📷</div>
            <button type="button" class="btn btn--secondary btn--sm" onClick="{{ toastPhoto }}">Upload a photo</button>
          </div>
          <input type="text" placeholder="Display name" style="width:100%;height:52px;padding:0 var(--sp-lg);border-radius:var(--r-md);background:var(--surface-alt);border:1px solid var(--border);color:var(--text);font-family:var(--font-body);font-size:var(--fs-md);outline:none;" />
        </sc-if>

        <!-- Step 1: location -->
        <sc-if value="{{ wizStep1 }}">
          <input type="text" value="Denver, CO" placeholder="City, State" style="width:100%;height:52px;padding:0 var(--sp-lg);margin-bottom:var(--sp-md);border-radius:var(--r-md);background:var(--surface-alt);border:1px solid var(--border);color:var(--text);font-family:var(--font-body);font-size:var(--fs-md);outline:none;" />
          <button type="button" class="chip" onClick="{{ toastLoc }}"><span class="chip__dot"></span>Use my current location</button>
        </sc-if>

        <!-- Step 2: vibes -->
        <sc-if value="{{ wizStep2 }}">
          <div style="display:flex;gap:var(--sp-sm);flex-wrap:wrap;margin-bottom:var(--sp-lg);">
            <sc-for list="{{ wizGenreChips }}" as="g" hint-placeholder-count="6">
              <button type="button" class="chip {{ g.cls }}" onClick="{{ g.toggle }}">{{ g.label }}</button>
            </sc-for>
          </div>
          <div style="font-size:var(--fs-xs);color:var(--text-muted);text-transform:uppercase;letter-spacing:var(--tr-wide);margin-bottom:var(--sp-sm);">Add artists you love</div>
          <div style="position:relative;margin-bottom:var(--sp-md);">
            <input type="text" value="{{ wizArtQuery }}" onInput="{{ setWizArtQuery }}" placeholder="Search artists — e.g. ODESZA, Skrillex" style="width:100%;height:52px;padding:0 var(--sp-lg) 0 44px;border-radius:var(--r-md);background:var(--surface-alt);border:1px solid var(--border);color:var(--text);font-family:var(--font-body);font-size:var(--fs-md);outline:none;" />
            <span style="position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--text-muted);">⌕</span>
            <sc-if value="{{ wizArtOpen }}">
              <div style="position:absolute;top:56px;left:0;right:0;z-index:20;background:var(--surface-hi);border:1px solid var(--border-strong);border-radius:var(--r-md);box-shadow:var(--overlay-shadow);padding:var(--sp-xs);max-height:200px;overflow:auto;">
                <sc-for list="{{ wizArtMatches }}" as="a" hint-placeholder-count="3">
                  <button type="button" onClick="{{ a.add }}" style="display:flex;align-items:center;gap:var(--sp-md);width:100%;text-align:left;padding:10px var(--sp-md);border:0;background:none;color:var(--text);font-family:var(--font-body);font-size:var(--fs-sm);border-radius:var(--r-sm);cursor:pointer;"><span style="color:var(--accent);">＋</span>{{ a.name }}</button>
                </sc-for>
              </div>
            </sc-if>
          </div>
          <sc-if value="{{ wizHasArtChosen }}">
            <div style="display:flex;gap:var(--sp-sm);flex-wrap:wrap;margin-bottom:var(--sp-lg);">
              <sc-for list="{{ wizArtChosen }}" as="a" hint-placeholder-count="2">
                <span class="chip is-active" style="cursor:default;">{{ a.name }} <button type="button" onClick="{{ a.remove }}" style="background:none;border:0;color:inherit;cursor:pointer;font-size:12px;margin-left:4px;padding:0;">✕</button></span>
              </sc-for>
            </div>
          </sc-if>
          <button type="button" class="btn btn--secondary btn--block btn--sm" onClick="{{ toastSc }}">🔗 Connect SoundCloud</button>
        </sc-if>

        <!-- Step 3: friends -->
        <sc-if value="{{ wizStep3 }}">
          <div style="position:relative;margin-bottom:var(--sp-lg);">
            <input type="text" placeholder="Search by name or username" style="width:100%;height:52px;padding:0 var(--sp-lg) 0 44px;border-radius:var(--r-md);background:var(--surface-alt);border:1px solid var(--border);color:var(--text);font-family:var(--font-body);font-size:var(--fs-md);outline:none;" />
            <span style="position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--text-muted);">⌕</span>
          </div>
          <div style="display:flex;flex-direction:column;gap:var(--sp-sm);">
            <sc-for list="{{ wizFriends }}" as="f" hint-placeholder-count="4">
              <div style="display:flex;align-items:center;gap:var(--sp-md);padding:var(--sp-sm) var(--sp-md);background:var(--surface-alt);border:1px solid var(--border);border-radius:var(--r-md);">
                <span style="width:40px;height:40px;border-radius:50%;background:var(--grad-brand);flex:0 0 auto;"></span>
                <div style="flex:1;"><div style="font-weight:600;font-size:var(--fs-sm);">{{ f.name }}</div><div style="font-size:var(--fs-xs);color:var(--text-muted);">{{ f.sub }}</div></div>
                <button type="button" class="{{ f.cls }}" onClick="{{ f.toggle }}" style="padding:7px 16px;border-radius:var(--r-pill);border:1px solid var(--glass-border);font-family:var(--font-body);font-weight:700;font-size:var(--fs-xs);cursor:pointer;">{{ f.label }}</button>
              </div>
            </sc-for>
          </div>
          <div style="display:flex;align-items:center;gap:10px;margin-top:var(--sp-lg);padding:var(--sp-md) var(--sp-lg);background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--r-md);color:var(--text-secondary);font-size:var(--fs-xs);">
            <span style="font-size:15px;">📱</span> Contacts sync is available in the iOS app.
          </div>
        </sc-if>

        <!-- Step 4: follow artists -->
        <sc-if value="{{ wizStep4 }}">
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:var(--sp-md);">
            <sc-for list="{{ wizArtists }}" as="a" hint-placeholder-count="6">
              <button type="button" onClick="{{ a.toggle }}" style="display:flex;flex-direction:column;align-items:center;gap:8px;padding:var(--sp-md);border-radius:var(--r-md);background:var(--surface-alt);border:1px solid {{ a.border }};cursor:pointer;">
                <span style="width:56px;height:56px;border-radius:50%;background:var(--grad-brand);"></span>
                <span style="font-size:var(--fs-xs);font-weight:600;color:var(--text);">{{ a.name }}</span>
                <span style="font-size:10px;font-weight:700;color:{{ a.color }};">{{ a.label }}</span>
              </button>
            </sc-for>
          </div>
        </sc-if>

        <div class="wiz-foot" style="display:flex;gap:var(--sp-md);margin-top:var(--sp-xxl);align-items:center;">
          <sc-if value="{{ wizHasBack }}"><button type="button" class="btn btn--ghost" onClick="{{ wizBack }}" style="flex:0 0 auto;">← Back</button></sc-if>
          <button type="button" class="btn btn--ghost" onClick="{{ wizSkip }}" style="flex:0 0 auto;">Skip</button>
          <button type="button" class="btn btn--primary" onClick="{{ wizNext }}" style="flex:1;">{{ wizNextLabel }}</button>
        </div>
      </div>
    </div>
  </main>
</sc-if>

<!-- ============ FIRST RSVP MOMENT ============ -->
<sc-if value="{{ screenRsvpMoment }}">
  <main style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:var(--sp-xxl) var(--sp-xl);position:relative;overflow:hidden;">
    <div style="position:absolute;width:560px;height:560px;border-radius:50%;background:radial-gradient(circle,rgba(226,77,255,0.3),transparent 62%);top:-200px;right:-100px;filter:blur(44px);animation:floatGlow 9s var(--ease) infinite;pointer-events:none;"></div>
    <div style="position:absolute;width:480px;height:480px;border-radius:50%;background:radial-gradient(circle,rgba(77,226,255,0.26),transparent 62%);bottom:-220px;left:-120px;filter:blur(44px);animation:floatGlow 11s var(--ease) infinite reverse;pointer-events:none;"></div>
    <div style="position:relative;width:100%;max-width:460px;text-align:center;">
      <div class="chip" style="display:inline-flex;margin-bottom:var(--sp-lg);">✦ &nbsp;You're all set, {{ rmName }}</div>
      <h1 style="font-family:var(--font-display);font-weight:700;font-size:clamp(30px,5vw,44px);line-height:1.04;letter-spacing:var(--tr-tight);margin:0 0 var(--sp-sm);">Lock in your first show</h1>
      <p style="color:var(--text-secondary);font-size:var(--fs-md);margin:0 0 var(--sp-xl);">RSVP to one show now — your crew will see you're going.</p>
      <div style="text-align:left;border-radius:var(--r-xl);overflow:hidden;border:1px solid var(--border-strong);box-shadow:var(--shadow-card);">
        <div style="position:relative;height:220px;{{ rm.gradStyle }}">
          <div class="wsc__scrim"></div>
          <span style="position:absolute;top:var(--sp-md);left:var(--sp-md);background:var(--glass-dark);border:1px solid var(--glass-border);padding:5px var(--sp-md);border-radius:var(--r-pill);color:var(--text);font-size:var(--fs-xs);font-weight:var(--fw-bold);letter-spacing:0.1em;text-transform:uppercase;">{{ rm.genre }}</span>
          <div style="position:absolute;left:0;right:0;bottom:0;padding:var(--sp-lg);">
            <div class="wsc__date">{{ rm.dateShort }}</div>
            <div style="font-family:var(--font-display);font-weight:700;font-size:var(--fs-xl);letter-spacing:var(--tr-snug);line-height:1.1;">{{ rm.title }}</div>
            <div style="color:var(--text-secondary);font-size:var(--fs-sm);margin-top:2px;">{{ rm.venueCity }}</div>
          </div>
        </div>
        <div style="padding:var(--sp-lg);background:var(--surface);">
          <sc-if value="{{ rm.hasFriends }}"><div style="color:var(--accent);font-weight:700;font-size:var(--fs-sm);margin-bottom:var(--sp-md);">👥 {{ rm.friendsLabel }} going</div></sc-if>
          <button type="button" class="btn btn--primary btn--block" onClick="{{ rmGoing }}">✓ I'm going</button>
        </div>
      </div>
      <button type="button" class="btn btn--ghost btn--block" style="margin-top:var(--sp-md);" onClick="{{ rmSkip }}">Maybe later — take me to Discover</button>
    </div>
  </main>
</sc-if>

<!-- ============ PROFILE ============ -->
<sc-if value="{{ screenProfile }}">
  <main class="wsh">
    <div style="max-width:960px;margin:0 auto;padding:var(--sp-xxl) var(--sp-xl) var(--sp-xxxl);">
      <div style="display:flex;gap:var(--sp-xl);align-items:center;flex-wrap:wrap;margin-bottom:var(--sp-xxl);">
        <span style="width:104px;height:104px;border-radius:50%;background:var(--grad-brand);box-shadow:0 0 0 3px var(--accent);flex:0 0 auto;"></span>
        <div style="flex:1;min-width:220px;">
          <div style="display:flex;align-items:center;gap:var(--sp-md);flex-wrap:wrap;">
            <h1 style="font-family:var(--font-display);font-weight:700;font-size:var(--fs-xxl);letter-spacing:var(--tr-snug);margin:0;">{{ prof.name }}</h1>
            <span style="font-size:10px;font-weight:800;letter-spacing:var(--tr-wide);color:var(--ink);background:var(--surface-hi);color:var(--text-muted);padding:4px 10px;border-radius:var(--r-pill);">DEMO — DROP+</span>
          </div>
          <div style="color:var(--text-secondary);margin:2px 0 var(--sp-sm);">{{ prof.handleCity }}</div>
          <p style="color:var(--text-secondary);font-size:var(--fs-sm);max-width:480px;margin:0;">{{ prof.bio }}</p>
        </div>
        <button type="button" class="btn btn--secondary" onClick="{{ goEditProfile }}">Edit profile</button>
      </div>

      <div style="display:flex;gap:var(--sp-md);flex-wrap:wrap;margin-bottom:var(--sp-xxl);">
        <sc-for list="{{ profileStats }}" as="s" hint-placeholder-count="3">
          <div style="flex:1;min-width:120px;padding:var(--sp-lg);background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);text-align:center;">
            <div style="font-family:var(--font-display);font-weight:700;font-size:var(--fs-xxl);{{ s.color }}">{{ s.value }}</div>
            <div style="font-size:var(--fs-xs);color:var(--text-muted);text-transform:uppercase;letter-spacing:var(--tr-wide);">{{ s.label }}</div>
          </div>
        </sc-for>
      </div>

      <!-- you vs crowd teaser -->
      <div style="display:flex;align-items:center;gap:var(--sp-lg);padding:var(--sp-lg);background:linear-gradient(120deg,#2b1c4d,#0d3b52);border:1px solid var(--border-strong);border-radius:var(--r-lg);margin-bottom:var(--sp-xxl);flex-wrap:wrap;">
        <div style="flex:1;min-width:220px;">
          <div style="font-family:var(--font-display);font-weight:700;font-size:var(--fs-lg);">You're in the top 4% of Denver ravers</div>
          <div style="color:var(--text-secondary);font-size:var(--fs-sm);">See your full year in Drop Wrapped.</div>
        </div>
        <button type="button" class="btn btn--primary btn--sm" onClick="{{ toastWrapped }}">View Wrapped</button>
      </div>

      <div class="sec__title" style="margin-bottom:var(--sp-md);">Manage</div>
      <div style="display:flex;flex-direction:column;gap:var(--sp-sm);">
        <sc-for list="{{ profileMenu }}" as="m" hint-placeholder-count="5">
          <button type="button" onClick="{{ m.act }}" style="display:flex;align-items:center;gap:var(--sp-md);padding:var(--sp-lg);background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);color:var(--text);font-family:var(--font-body);font-size:var(--fs-md);text-align:left;cursor:pointer;">
            <span style="width:22px;">{{ m.icon }}</span><span style="flex:1;">{{ m.label }}</span><span style="color:var(--text-muted);">›</span>
          </button>
        </sc-for>
      </div>
    </div>
  </main>
</sc-if>

<!-- ============ EDIT PROFILE ============ -->
<sc-if value="{{ screenEditProfile }}">
  <main class="wsh">
    <div style="max-width:560px;margin:0 auto;padding:var(--sp-xxl) var(--sp-xl) var(--sp-xxxl);">
      <a href="#" onClick="{{ goProfile }}" style="display:inline-flex;align-items:center;gap:6px;color:var(--text-secondary);font-size:var(--fs-sm);margin-bottom:var(--sp-lg);">← Back to profile</a>
      <h1 style="font-family:var(--font-display);font-weight:700;font-size:var(--fs-xxl);letter-spacing:var(--tr-snug);margin:0 0 var(--sp-xl);">Edit profile</h1>
      <div style="display:flex;align-items:center;gap:var(--sp-lg);margin-bottom:var(--sp-xl);">
        <span style="width:80px;height:80px;border-radius:50%;background:var(--grad-brand);box-shadow:0 0 0 3px var(--accent);flex:0 0 auto;"></span>
        <button type="button" class="btn btn--secondary btn--sm" onClick="{{ toastPhoto }}">Change photo</button>
      </div>
      <label style="display:block;font-size:var(--fs-sm);color:var(--text-secondary);margin-bottom:6px;">Display name</label>
      <input id="edit-name" type="text" value="{{ prof.name }}" style="width:100%;height:52px;padding:0 var(--sp-lg);margin-bottom:var(--sp-lg);border-radius:var(--r-md);background:var(--surface-alt);border:1px solid var(--border);color:var(--text);font-family:var(--font-body);font-size:var(--fs-md);outline:none;" />
      <label style="display:block;font-size:var(--fs-sm);color:var(--text-secondary);margin-bottom:6px;">Username</label>
      <input id="edit-username" type="text" value="{{ prof.username }}" style="width:100%;height:52px;padding:0 var(--sp-lg);margin-bottom:var(--sp-lg);border-radius:var(--r-md);background:var(--surface-alt);border:1px solid var(--border);color:var(--text);font-family:var(--font-body);font-size:var(--fs-md);outline:none;" />
      <label style="display:block;font-size:var(--fs-sm);color:var(--text-secondary);margin-bottom:6px;">Bio <span style="color:var(--text-muted);">· 200 max</span></label>
      <textarea id="edit-bio" style="width:100%;height:96px;padding:var(--sp-md) var(--sp-lg);margin-bottom:var(--sp-lg);border-radius:var(--r-md);background:var(--surface-alt);border:1px solid var(--border);color:var(--text);font-family:var(--font-body);font-size:var(--fs-md);outline:none;resize:none;">{{ prof.bio }}</textarea>
      <label style="display:block;font-size:var(--fs-sm);color:var(--text-secondary);margin-bottom:6px;">City, State</label>
      <input id="edit-city" type="text" value="{{ prof.cityState }}" style="width:100%;height:52px;padding:0 var(--sp-lg);margin-bottom:var(--sp-xl);border-radius:var(--r-md);background:var(--surface-alt);border:1px solid var(--border);color:var(--text);font-family:var(--font-body);font-size:var(--fs-md);outline:none;" />
      <label class="sw" style="justify-content:space-between;width:100%;margin-bottom:var(--sp-xxl);">
        <span style="font-size:var(--fs-sm);color:var(--text);">Let friends find me by phone number</span>
        <input class="sw__input" type="checkbox" role="switch" /><span class="sw__track"><span class="sw__thumb"></span></span>
      </label>
      <button type="button" class="btn btn--primary btn--block" onClick="{{ saveProfile }}">Save changes</button>
    </div>
  </main>
</sc-if>

<!-- ============ NOTIFICATIONS ============ -->
<sc-if value="{{ screenNotifications }}">
  <main class="wsh">
    <div style="max-width:640px;margin:0 auto;padding:var(--sp-xxl) var(--sp-xl) var(--sp-xxxl);">
      <div class="wsh__headrow" style="margin-bottom:var(--sp-lg);">
        <h1 style="font-family:var(--font-display);font-weight:700;font-size:var(--fs-xxl);letter-spacing:var(--tr-snug);margin:0;">Notifications <span class="chip" style="pointer-events:none;">Demo data</span></h1>
        <div style="display:flex;gap:var(--sp-sm);">
          <button type="button" class="btn btn--ghost btn--sm" onClick="{{ markAllRead }}">Mark all read</button>
          <button type="button" class="btn btn--ghost btn--sm" onClick="{{ clearNotifs }}">Clear all</button>
        </div>
      </div>
      <sc-if value="{{ notifEmpty }}">
        <div class="empty"><div class="empty__ico">🔔</div><div class="empty__title">No notifications yet</div><div class="empty__body">Presale alerts, friend RSVPs, and show reminders will land here.</div></div>
      </sc-if>
      <div style="display:flex;flex-direction:column;gap:var(--sp-sm);">
        <sc-for list="{{ notifications }}" as="n" hint-placeholder-count="6">
          <button type="button" onClick="{{ n.act }}" style="display:flex;align-items:flex-start;gap:var(--sp-md);padding:var(--sp-lg);background:{{ n.bg }};border:1px solid var(--border);border-radius:var(--r-md);text-align:left;cursor:pointer;">
            <span style="width:38px;height:38px;border-radius:50%;background:var(--glass);border:1px solid var(--glass-border);display:flex;align-items:center;justify-content:center;font-size:16px;flex:0 0 auto;">{{ n.icon }}</span>
            <div style="flex:1;"><div style="font-size:var(--fs-sm);color:var(--text);"><b>{{ n.title }}</b> {{ n.body }}</div><div style="font-size:var(--fs-xs);color:var(--text-muted);margin-top:2px;">{{ n.time }}</div></div>
            <sc-if value="{{ n.unread }}"><span style="width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);flex:0 0 auto;margin-top:6px;"></span></sc-if>
          </button>
        </sc-for>
      </div>
    </div>
  </main>
</sc-if>

<!-- ============ SETTINGS ============ -->
<sc-if value="{{ screenSettings }}">
  <main class="wsh">
    <div style="max-width:640px;margin:0 auto;padding:var(--sp-xxl) var(--sp-xl) var(--sp-xxxl);">
      <h1 style="font-family:var(--font-display);font-weight:700;font-size:var(--fs-xxl);letter-spacing:var(--tr-snug);margin:0 0 var(--sp-xl);">Settings</h1>

      <div class="sec__title" style="margin-bottom:var(--sp-md);">Notifications</div>
      <div style="display:flex;flex-direction:column;gap:var(--sp-sm);margin-bottom:var(--sp-xxl);">
        <sc-for list="{{ settingsToggles }}" as="t" hint-placeholder-count="4">
          <label class="sw" style="justify-content:space-between;width:100%;padding:var(--sp-md) var(--sp-lg);background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);">

                <div class="wsc__text"><div class="wsc__date">{{ ev.dateShort }}</div><div class="wsc__title">{{ ev.title }}</div><div class="wsc__venue">{{ ev.venueCity }}</div></div>

                <button type="button" class="wsc__act" onClick="{{ ev.ics }}">📅 .ics</button>

            </div>

        <sc-if value="{{ myUpcomingEmpty }}">

                <div class="wsc__img" style="{{ ev.gradStyle }}"></div><div class="wsc__scrim"></div>
                <span style="position:absolute;top:var(--sp-md);left:var(--sp-md);background:var(--glass-dark);border:1px solid var(--glass-border);padding:5px var(--sp-md);border-radius:var(--r-pill);color:var(--text);font-size:var(--fs-xs);font-weight:var(--fw-bold);letter-spacing:0.1em;text-transform:uppercase;">{{ ev.genre }}</span>
                <span class="wsc__price">{{ ev.price }}</span>
                <div class="wsc__text"><div class="wsc__date">{{ ev.dateShort }}</div><div class="wsc__title">{{ ev.title }}</div><div class="wsc__venue">{{ ev.venueCity }}</div></div>
              </a>
              <div class="wsc__actions">
                <button type="button" class="wsc__act is-going" onClick="{{ ev.unsave }}">♥ Saved</button>
                <button type="button" class="wsc__share" aria-label="Share" onClick="{{ ev.share }}">↗</button>
              </div>
            </div>
          </sc-for>
        </div>
        <sc-if value="{{ mySavedEmpty }}">
          <div class="empty"><div class="empty__ico">♡</div><div class="empty__title">Nothing saved yet</div><div class="empty__body">Tap the heart on any show to save it for later. <span class="chip" style="pointer-events:none;">Demo data — this device only</span></div><button type="button" class="btn btn--primary btn--sm" onClick="{{ goDiscover }}">Browse shows</button></div>
        </sc-if>
      </sc-if>

      <sc-if value="{{ myShowPast }}">
        <div style="display:flex;flex-direction:column;gap:var(--sp-md);">
          <sc-for list="{{ myPast }}" as="p" hint-placeholder-count="3">
            <div style="display:flex;align-items:center;gap:var(--sp-lg);padding:var(--sp-md);background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);flex-wrap:wrap;">

                <span style="font-size:var(--fs-xs);color:var(--text-muted);">{{ p.rateLabel }}</span>
                <div style="display:flex;gap:4px;">
                  <sc-for list="{{ p.stars }}" as="st" hint-placeholder-count="5">
                    <button type="button" onClick="{{ st.set }}" style="background:none;border:0;cursor:pointer;font-size:22px;line-height:1;color:{{ st.color }};padding:0;">{{ st.glyph }}</button>

        <sc-if value="{{ myPastEmpty }}">
          <div class="empty"><div class="empty__ico">🎶</div><div class="empty__title">No past shows logged</div><div class="empty__body">Log a show you attended and it'll appear here to rate and remember.</div><button type="button" class="btn btn--primary btn--sm" onClick="{{ goLogShow }}">Log a show</button></div>
        </sc-if>
      </sc-if>
      </sc-if>
    </div>
  </main>
</sc-if>

<!-- ============ PICK ARTISTS ============ -->
<sc-if value="{{ screenArtists }}">
  <main class="wsh">
    <div style="max-width:1440px;margin:0 auto;padding:var(--sp-xxl) var(--sp-xl) var(--sp-xxxl);">
      <div class="wsh__headrow" style="margin-bottom:var(--sp-md);">
        <div>
          <h1 style="font-family:var(--font-display);font-weight:700;font-size:var(--fs-xxl);letter-spacing:var(--tr-snug);margin:0 0 4px;">Follow artists <span class="chip" style="pointer-events:none;vertical-align:middle;font-size:14px;">Demo data</span></h1>

      <div style="display:flex;gap:var(--sp-sm);flex-wrap:wrap;margin-bottom:var(--sp-md);">
        <sc-for list="{{ artGenreChips }}" as="g" hint-placeholder-count="7">

      <div style="display:flex;align-items:center;gap:6px;color:var(--text-muted);font-size:var(--fs-xs);margin-bottom:var(--sp-xl);">

          <div style="display:flex;flex-direction:column;align-items:center;gap:8px;padding:var(--sp-lg);background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);">
            <button type="button" onClick="{{ a.open }}" style="display:flex;flex-direction:column;align-items:center;gap:8px;background:none;border:0;cursor:pointer;padding:0;">
              <div style="position:relative;">
                <span style="width:72px;height:72px;border-radius:50%;background:var(--grad-brand);display:block;"></span>
                <sc-if value="{{ a.upcoming }}"><span style="position:absolute;bottom:2px;right:2px;width:14px;height:14px;border-radius:50%;background:var(--attended);border:2px solid var(--surface);box-shadow:0 0 8px var(--attended);"></span></sc-if>
              </div>
              <div style="font-family:var(--font-display);font-weight:700;font-size:var(--fs-sm);text-align:center;color:var(--text);">{{ a.name }}</div>
              <div style="font-size:var(--fs-xs);color:var(--text-muted);">{{ a.genre }} · {{ a.followers }}</div>
            </button>
            <button type="button" class="{{ a.cls }}" onClick="{{ a.toggle }}" style="width:100%;padding:8px;border-radius:var(--r-pill);border:1px solid var(--glass-border);font-family:var(--font-body);font-weight:700;font-size:var(--fs-xs);cursor:pointer;">{{ a.label }}</button>
          </div>

<!-- ============ BROWSE VENUES ============ -->
<sc-if value="{{ screenVenues }}">
  <main class="wsh">
    <div style="max-width:1000px;margin:0 auto;padding:var(--sp-xxl) var(--sp-xl) var(--sp-xxxl);">
      <h1 style="font-family:var(--font-display);font-weight:700;font-size:var(--fs-xxl);letter-spacing:var(--tr-snug);margin:0 0 var(--sp-lg);">Venues</h1>
      <div style="position:relative;margin-bottom:var(--sp-xl);">
        <input type="text" value="{{ venueQuery }}" onInput="{{ setVenueQuery }}" placeholder="Search venues, cities, states" style="width:100%;height:52px;padding:0 var(--sp-lg) 0 44px;border-radius:var(--r-pill);background:var(--surface);border:1px solid var(--border-strong);color:var(--text);font-family:var(--font-body);font-size:var(--fs-md);outline:none;" />

      </div>
      <sc-if value="{{ venuesEmpty }}">

          </div>
          <div style="display:flex;flex-direction:column;gap:var(--sp-sm);">
            <sc-for list="{{ grp.venues }}" as="v" hint-placeholder-count="4">
              <button type="button" onClick="{{ v.open }}" style="display:flex;align-items:center;gap:var(--sp-lg);padding:var(--sp-md) var(--sp-lg);background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);text-align:left;cursor:pointer;">
                <span style="width:48px;height:48px;border-radius:var(--r-md);background:var(--grad-brand);flex:0 0 auto;"></span>
                <div style="flex:1;min-width:0;">
                  <div style="font-family:var(--font-display);font-weight:700;font-size:var(--fs-md);color:var(--text);">{{ v.name }}</div>
                  <div style="font-size:var(--fs-sm);color:var(--text-secondary);">{{ v.city }} · Cap. {{ v.capacity }}</div>
