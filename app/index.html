<!-- ============ CREW ============ -->
<sc-if value="{{ screenCrew }}">
  <main class="wsh">
    <div style="max-width:820px;margin:0 auto;padding:var(--sp-xxl) var(--sp-xl) var(--sp-xxxl);">
      <div class="wsh__headrow" style="margin-bottom:var(--sp-lg);">
        <h1 style="font-family:var(--font-display);font-weight:700;font-size:var(--fs-xxl);letter-spacing:var(--tr-snug);margin:0;">Crew <span class="chip" style="pointer-events:none;">Demo data</span></h1>
        <button type="button" class="btn btn--secondary btn--sm" onClick="{{ goInvite }}">↗ Invite friends</button>
      </div>
      <div class="seg" style="margin-bottom:var(--sp-xl);">
        <sc-for list="{{ crewTabs }}" as="t" hint-placeholder-count="4">
          <div class="seg__item {{ t.cls }}" onClick="{{ t.pick }}">{{ t.label }}</div>
        </sc-for>
      </div>

      <!-- Friends -->
      <sc-if value="{{ crewFriends }}">
        <div style="display:flex;flex-direction:column;gap:var(--sp-sm);">
          <sc-for list="{{ friendsList }}" as="f" hint-placeholder-count="4">
            <div style="display:flex;align-items:center;gap:var(--sp-md);padding:var(--sp-md) var(--sp-lg);background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);flex-wrap:wrap;">
              <span style="width:48px;height:48px;border-radius:50%;background:var(--grad-brand);flex:0 0 auto;box-shadow:0 0 0 2px {{ f.ring }};"></span>
              <div style="flex:1;min-width:160px;">
                <div style="font-weight:600;font-size:var(--fs-sm);">{{ f.name }}</div>
                <div style="font-size:var(--fs-xs);color:var(--text-muted);">{{ f.handle }}</div>
                <div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;">
                  <sc-for list="{{ f.chips }}" as="c" hint-placeholder-count="3"><span style="font-size:10px;padding:2px 8px;border-radius:var(--r-pill);background:var(--glass);border:1px solid var(--glass-border);color:var(--text-secondary);">{{ c.label }}</span></sc-for>
                </div>
              </div>
              <span style="font-size:var(--fs-xs);font-weight:700;color:{{ f.overlapColor }};">{{ f.overlapLabel }}</span>
            </div>
          </sc-for>
        </div>
      </sc-if>

      <!-- Requests -->
      <sc-if value="{{ crewRequests }}">
        <sc-if value="{{ requestsEmpty }}"><div class="empty"><div class="empty__ico">📨</div><div class="empty__title">No pending requests</div><div class="empty__body">When someone asks to join your crew, they'll show up here.</div></div></sc-if>
        <div style="display:flex;flex-direction:column;gap:var(--sp-sm);">
          <sc-for list="{{ requestsList }}" as="r" hint-placeholder-count="2">
            <div style="display:flex;align-items:center;gap:var(--sp-md);padding:var(--sp-md) var(--sp-lg);background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);flex-wrap:wrap;">
              <span style="width:48px;height:48px;border-radius:50%;background:var(--grad-brand);flex:0 0 auto;"></span>
              <div style="flex:1;min-width:140px;">
                <div style="font-weight:600;font-size:var(--fs-sm);">{{ r.name }}</div>
                <div style="font-size:var(--fs-xs);color:var(--text-muted);">{{ r.handle }} · {{ r.overlapLabel }}</div>
              </div>
              <div style="display:flex;gap:var(--sp-sm);">
                <button type="button" class="btn btn--primary btn--sm" onClick="{{ r.accept }}">Accept</button>
                <button type="button" class="btn btn--ghost btn--sm" onClick="{{ r.decline }}">Decline</button>
              </div>
            </div>
          </sc-for>
        </div>
      </sc-if>

      <!-- Find -->
      <sc-if value="{{ crewFind }}">
        <div style="position:relative;margin-bottom:var(--sp-lg);">
          <input type="text" placeholder="Search by name or username" style="width:100%;height:52px;padding:0 var(--sp-lg) 0 44px;border-radius:var(--r-md);background:var(--surface-alt);border:1px solid var(--border);color:var(--text);font-family:var(--font-body);font-size:var(--fs-md);outline:none;" />
          <span style="position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--text-muted);">⌕</span>
        </div>
        <div style="font-size:var(--fs-xs);color:var(--text-muted);text-transform:uppercase;letter-spacing:var(--tr-wide);margin-bottom:var(--sp-sm);">Suggested — based on your taste</div>
        <div style="display:flex;flex-direction:column;gap:var(--sp-sm);">
          <sc-for list="{{ findList }}" as="p" hint-placeholder-count="3">
            <div style="display:flex;align-items:center;gap:var(--sp-md);padding:var(--sp-md) var(--sp-lg);background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);flex-wrap:wrap;">
              <span style="width:48px;height:48px;border-radius:50%;background:var(--grad-brand);flex:0 0 auto;"></span>
              <div style="flex:1;min-width:160px;">
                <div style="font-weight:600;font-size:var(--fs-sm);">{{ p.name }}</div>
                <div style="font-size:var(--fs-xs);color:var(--text-muted);">{{ p.handle }} · {{ p.mutuals }}</div>
                <div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;">
                  <sc-for list="{{ p.chips }}" as="c" hint-placeholder-count="3"><span style="font-size:10px;padding:2px 8px;border-radius:var(--r-pill);background:var(--glass);border:1px solid var(--glass-border);color:var(--text-secondary);">{{ c.label }}</span></sc-for>
                </div>
              </div>
              <button type="button" class="{{ p.cls }}" onClick="{{ p.add }}" style="padding:8px 18px;border-radius:var(--r-pill);border:1px solid var(--glass-border);font-family:var(--font-body);font-weight:700;font-size:var(--fs-xs);cursor:pointer;">{{ p.label }}</button>
            </div>
          </sc-for>
        </div>
      </sc-if>

      <!-- Plans -->
      <sc-if value="{{ crewPlans }}">
        <div style="display:flex;flex-direction:column;gap:var(--sp-md);">
          <sc-for list="{{ plansList }}" as="p" hint-placeholder-count="2">
            <button type="button" onClick="{{ p.open }}" style="display:flex;align-items:center;gap:var(--sp-lg);padding:var(--sp-md);background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);text-align:left;cursor:pointer;flex-wrap:wrap;">
              <div style="width:72px;height:72px;border-radius:var(--r-md);flex:0 0 auto;{{ p.gradStyle }}"></div>
              <div style="flex:1;min-width:160px;">
                <div class="wsc__date">{{ p.dateShort }}</div>
                <div style="font-family:var(--font-display);font-weight:700;font-size:var(--fs-md);">{{ p.title }}</div>
                <div style="color:var(--text-secondary);font-size:var(--fs-sm);">{{ p.venueCity }}</div>
              </div>
              <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
                <div class="avstack">
                  <sc-for list="{{ p.avatars }}" as="a" hint-placeholder-count="3"><span class="av" style="box-shadow:0 0 0 2px {{ a.ring }};"></span></sc-for>
                </div>
                <span style="font-size:var(--fs-xs);color:var(--going);font-weight:700;">{{ p.goingLabel }}</span>
              </div>
            </button>
          </sc-for>
        </div>
      </sc-if>
    </div>
  </main>
</sc-if>

<!-- ============ PLAN DETAIL ============ -->
<sc-if value="{{ screenPlan }}">
  <main class="wsh">
    <div style="max-width:820px;margin:0 auto;padding:var(--sp-lg) var(--sp-xl) var(--sp-xxxl);">
      <a href="#" onClick="{{ goCrew }}" style="display:inline-flex;align-items:center;gap:6px;color:var(--text-secondary);font-size:var(--fs-sm);margin-bottom:var(--sp-lg);">← Back to crew</a>
      <div style="position:relative;overflow:hidden;border-radius:var(--r-xl);border:1px solid var(--border);height:220px;{{ pd.gradStyle }}">
        <div class="wsc__scrim"></div>
        <div style="position:absolute;left:0;right:0;bottom:0;padding:var(--sp-xl);">
          <div class="wsc__date">{{ pd.dateShort }}</div>
          <h1 style="font-family:var(--font-display);font-weight:700;font-size:clamp(24px,4vw,36px);letter-spacing:var(--tr-tight);margin:4px 0 2px;">{{ pd.title }} <span class="chip" style="pointer-events:none;vertical-align:middle;">Demo data</span></h1>
          <div style="color:var(--text-secondary);font-size:var(--fs-sm);">{{ pd.venueCity }}</div>
        </div>
      </div>

      <!-- roster -->
      <div style="padding:var(--sp-xl) 0;border-bottom:1px solid var(--border);">
        <div class="sec" style="padding:0 0 var(--sp-md);"><div class="sec__title">Who's in</div><a href="#" class="sec__more" onClick="{{ goInvite }}">Invite more</a></div>
        <div style="display:flex;gap:var(--sp-lg);flex-wrap:wrap;">
          <sc-for list="{{ pd.roster }}" as="m" hint-placeholder-count="4">
            <div style="display:flex;flex-direction:column;align-items:center;gap:6px;width:76px;">
              <span style="width:56px;height:56px;border-radius:50%;background:var(--grad-brand);box-shadow:0 0 0 3px {{ m.ring }};"></span>
              <span style="font-size:var(--fs-xs);color:var(--text-secondary);text-align:center;">{{ m.name }}</span>
              <span style="font-size:9px;font-weight:800;letter-spacing:var(--tr-wide);text-transform:uppercase;color:{{ m.ring }};">{{ m.status }}</span>
            </div>
          </sc-for>
        </div>
        <div style="display:flex;gap:var(--sp-lg);margin-top:var(--sp-lg);flex-wrap:wrap;font-size:var(--fs-xs);color:var(--text-muted);">
          <span style="display:inline-flex;align-items:center;gap:5px;"><span style="width:8px;height:8px;border-radius:50%;background:var(--going);"></span>Going</span>
          <span style="display:inline-flex;align-items:center;gap:5px;"><span style="width:8px;height:8px;border-radius:50%;background:var(--interested);"></span>Interested</span>
          <span style="display:inline-flex;align-items:center;gap:5px;"><span style="width:8px;height:8px;border-radius:50%;background:var(--border-strong);"></span>Invited</span>
        </div>
      </div>

      <!-- meetup spot -->
      <div style="padding:var(--sp-xl) 0;border-bottom:1px solid var(--border);">

        <div style="display:flex;flex-direction:column;gap:var(--sp-sm);">

      <div style="padding:var(--sp-xl) 0;">

      </div>

</sc-if>

<!-- ============ CREW BUILDER INTERSTITIAL ============ -->

<!-- ============ INVITE FRIENDS ============ -->
<sc-if value="{{ screenInvite }}">
  <main class="wsh">
    <div style="max-width:600px;margin:0 auto;padding:var(--sp-xxl) var(--sp-xl) var(--sp-xxxl);">
      <a href="#" onClick="{{ goCrew }}" style="display:inline-flex;align-items:center;gap:6px;color:var(--text-secondary);font-size:var(--fs-sm);margin-bottom:var(--sp-lg);">← Back to crew</a>
      <h1 style="font-family:var(--font-display);font-weight:700;font-size:var(--fs-xxl);letter-spacing:var(--tr-snug);margin:0 0 var(--sp-xs);">Invite friends, earn Drop+ <span class="chip" style="pointer-events:none;">Demo data</span></h1>

          <span style="font-size:var(--fs-sm);color:var(--accent);">{{ inviteRemainLabel }}</span>

        <input type="text" value="drop.fm/join/alexraves" readonly="{{ true }}" style="flex:1;height:52px;padding:0 var(--sp-lg);border-radius:var(--r-md);background:var(--surface-alt);border:1px solid var(--border);color:var(--text);font-family:var(--font-body);font-size:var(--fs-md);outline:none;" />
        <button type="button" class="btn btn--primary" onClick="{{ inviteCopy }}">Copy</button>

            <div style="flex:1;"><div style="font-weight:600;font-size:var(--fs-sm);">{{ p.name }}</div><div style="font-size:var(--fs-xs);color:var(--text-muted);">{{ p.handle }}</div></div>
            <button type="button" class="{{ p.cls }}" onClick="{{ p.invite }}" style="padding:8px 18px;border-radius:var(--r-pill);border:1px solid var(--glass-border);font-family:var(--font-body);font-weight:700;font-size:var(--fs-xs);cursor:pointer;">{{ p.label }}</button>
          </div>
        </sc-for>
      </div>
    </div>
  </main>
</sc-if>

<!-- ============ DROP WRAPPED ============ -->
<sc-if value="{{ screenWrapped }}">
  <main style="position:relative;overflow:hidden;min-height:100vh;">
    <div style="position:absolute;width:620px;height:620px;border-radius:50%;background:radial-gradient(circle,rgba(226,77,255,0.24),transparent 62%);top:-220px;right:-120px;filter:blur(46px);animation:floatGlow 10s var(--ease) infinite;pointer-events:none;"></div>
    <div style="position:absolute;width:520px;height:520px;border-radius:50%;background:radial-gradient(circle,rgba(182,255,106,0.2),transparent 62%);bottom:-240px;left:-120px;filter:blur(46px);animation:floatGlow 12s var(--ease) infinite reverse;pointer-events:none;"></div>
    <div style="position:relative;max-width:880px;margin:0 auto;padding:var(--sp-xxl) var(--sp-xl) var(--sp-xxxl);">
      <div class="wsh__headrow" style="margin-bottom:var(--sp-xl);gap:var(--sp-lg);">
        <div>
          <div class="wsc__date">{{ wr.badge }}</div>
          <h1 style="font-family:var(--font-display);font-weight:700;font-size:clamp(32px,5vw,52px);letter-spacing:var(--tr-tight);margin:2px 0 0;">{{ wr.subhead }}</h1>
        </div>
        <div class="seg">
          <sc-for list="{{ wrappedTabs }}" as="t" hint-placeholder-count="2">
            <div class="seg__item {{ t.cls }}" onClick="{{ t.pick }}">{{ t.label }}</div>
          </sc-for>
        </div>
      </div>

      <!-- honest empty state — no attended shows yet in this period -->
      <sc-if value="{{ wrappedEmpty }}">
        <div style="padding:var(--sp-xxl);border-radius:var(--r-lg);border:1px solid var(--border);background:var(--surface);text-align:center;">
          <div style="font-family:var(--font-display);font-weight:700;font-size:var(--fs-xl);margin-bottom:var(--sp-sm);">Your first show unlocks your Wrapped</div>
          <p style="color:var(--text-secondary);font-size:var(--fs-sm);margin:0 0 var(--sp-lg);">RSVP to a show and mark it attended once it happens — Drop tallies your artists, venues and genres automatically. Already been to shows? Add your past nights to build your Wrapped now.</p>
          <div style="display:flex;gap:var(--sp-sm);justify-content:center;flex-wrap:wrap;">
            <button type="button" class="btn btn--primary" onClick="{{ goLogShow }}">＋ Add your past shows</button>
            <button type="button" class="btn btn--secondary" onClick="{{ goDiscover }}">Find a show</button>
          </div>
        </div>
      </sc-if>

      <sc-if value="{{ wrappedHasData }}">
      <!-- stat hero -->
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:var(--sp-md);margin-bottom:var(--sp-xl);">
        <div style="grid-column:span 2;padding:var(--sp-xl);border-radius:var(--r-lg);border:1px solid var(--border-strong);background:linear-gradient(120deg,#2b1c4d,#0d3b52 55%,#143a22);position:relative;overflow:hidden;">
          <div class="metric__label" style="color:var(--text-secondary);">{{ wr.showsLabel }}</div>
          <div style="font-family:var(--font-display);font-weight:700;font-size:clamp(56px,9vw,96px);line-height:1;background:var(--grad-glow);-webkit-background-clip:text;background-clip:text;color:transparent;">{{ wr.shows }}</div>
          <div style="color:var(--text-secondary);font-size:var(--fs-sm);margin-top:4px;">{{ wr.hours }} hours on the floor (est.)</div>
        </div>
        <div style="padding:var(--sp-lg);border-radius:var(--r-lg);border:1px solid var(--border);background:var(--surface);">
          <div class="metric__label">Top artist</div>
          <div style="font-family:var(--font-display);font-weight:700;font-size:var(--fs-xl);margin-top:4px;">{{ wr.topArtist }}</div>
          <div class="metric__label" style="margin-top:var(--sp-md);">Top venue</div>
          <div style="font-family:var(--font-display);font-weight:700;font-size:var(--fs-xl);margin-top:4px;">{{ wr.topVenue }}</div>
        </div>
      </div>

      <!-- rankings: top artists / venues / genres -->
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:var(--sp-md);margin-bottom:var(--sp-xl);">
        <div style="padding:var(--sp-lg);border-radius:var(--r-lg);border:1px solid var(--border);background:var(--surface);">
          <div class="sec__title" style="margin-bottom:var(--sp-md);">Top artists</div>
          <div style="display:flex;flex-direction:column;gap:var(--sp-sm);">
            <sc-for list="{{ wrappedTopArtists }}" as="a" hint-placeholder-count="3">
              <div style="display:flex;align-items:center;gap:var(--sp-md);">
                <span style="font-family:var(--font-display);font-weight:700;font-size:var(--fs-lg);{{ a.rankColor }}width:20px;flex:0 0 auto;">{{ a.rank }}</span>
                <span style="width:38px;height:38px;border-radius:50%;background:var(--grad-brand);flex:0 0 auto;"></span>
                <div style="flex:1;min-width:0;"><div style="font-weight:700;font-size:var(--fs-sm);color:var(--text);">{{ a.name }}</div><div style="font-size:var(--fs-xs);color:var(--text-muted);">{{ a.meta }}</div></div>
              </div>
            </sc-for>
          </div>
        </div>
        <div style="padding:var(--sp-lg);border-radius:var(--r-lg);border:1px solid var(--border);background:var(--surface);">
          <div class="sec__title" style="margin-bottom:var(--sp-md);">Top venues</div>
          <div style="display:flex;flex-direction:column;gap:var(--sp-sm);">
            <sc-for list="{{ wrappedTopVenues }}" as="v" hint-placeholder-count="3">
              <div style="display:flex;align-items:center;gap:var(--sp-md);">
                <span style="font-family:var(--font-display);font-weight:700;font-size:var(--fs-lg);{{ v.rankColor }}width:20px;flex:0 0 auto;">{{ v.rank }}</span>
                <div style="flex:1;min-width:0;"><div style="font-weight:700;font-size:var(--fs-sm);color:var(--text);">{{ v.name }}</div><div style="font-size:var(--fs-xs);color:var(--text-muted);">{{ v.meta }}</div></div>
              </div>
            </sc-for>
          </div>
        </div>
        <div style="padding:var(--sp-lg);border-radius:var(--r-lg);border:1px solid var(--border);background:var(--surface);">
          <div class="sec__title" style="margin-bottom:var(--sp-md);">Top genres</div>
          <div style="display:flex;flex-direction:column;gap:var(--sp-md);">
            <sc-for list="{{ wrappedTopGenres }}" as="g" hint-placeholder-count="3">
              <div>
                <div style="display:flex;justify-content:space-between;margin-bottom:4px;font-size:var(--fs-sm);"><span style="color:var(--text);font-weight:600;">{{ g.name }}</span><span style="color:var(--text-muted);">{{ g.pct }}</span></div>
                <div style="height:8px;border-radius:var(--r-pill);background:var(--surface-hi);overflow:hidden;"><div style="height:100%;border-radius:var(--r-pill);background:var(--grad-glow-fill);{{ g.barStyle }}"></div></div>
              </div>
            </sc-for>
          </div>
        </div>
      </div>

      <!-- YEAR mode: month-by-month strip -->
      <sc-if value="{{ wrappedYear }}">
        <div style="padding:var(--sp-xl);border-radius:var(--r-lg);border:1px solid var(--border);background:var(--surface);margin-bottom:var(--sp-xl);">
          <div class="sec" style="padding:0 0 var(--sp-lg);">
            <div class="sec__title">Month by month</div>
            <span style="font-size:var(--fs-sm);color:var(--text-secondary);">Busiest: <b style="color:var(--accent);">{{ wr.busiestMonth }}</b> · {{ wr.busiestCount }} shows</span>
          </div>
          <div style="display:flex;align-items:flex-end;gap:1.6%;height:136px;">
            <sc-for list="{{ wrappedMonths }}" as="m" hint-placeholder-count="12">
              <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end;">
                <div style="width:100%;max-width:26px;border-radius:var(--r-sm) var(--r-sm) 0 0;{{ m.barStyle }}min-height:4px;"></div>
                <span style="font-size:9px;color:var(--text-muted);">{{ m.label }}</span>
              </div>
            </sc-for>
          </div>
        </div>
      </sc-if>

      <!-- ALL-TIME mode: first show + years active -->
      <sc-if value="{{ wrappedAllTime }}">
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:var(--sp-md);margin-bottom:var(--sp-xl);">
          <div style="grid-column:span 2;padding:var(--sp-xl);border-radius:var(--r-lg);border:1px solid var(--border);background:var(--surface);">
            <div class="metric__label" style="color:var(--text-secondary);">First show ever</div>
            <div style="font-family:var(--font-display);font-weight:700;font-size:var(--fs-xl);margin-top:6px;">{{ wr.firstTitle }}</div>
            <div style="color:var(--text-secondary);font-size:var(--fs-sm);margin-top:4px;">{{ wr.firstVenue }} · {{ wr.firstDate }}</div>
          </div>
          <div style="padding:var(--sp-xl);border-radius:var(--r-lg);border:1px solid var(--border-strong);background:linear-gradient(120deg,#143a22,#0d3b52 60%);text-align:center;display:flex;flex-direction:column;justify-content:center;">
            <div style="font-family:var(--font-display);font-weight:700;font-size:clamp(40px,7vw,64px);line-height:1;background:var(--grad-glow);-webkit-background-clip:text;background-clip:text;color:transparent;">{{ wr.yearsActive }}</div>
            <div class="metric__label" style="color:var(--text-secondary);margin-top:4px;">Years active · since {{ wr.sinceYear }}</div>
          </div>
        </div>
      </sc-if>

      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:var(--sp-md);margin-bottom:var(--sp-xl);">
        <sc-for list="{{ wrappedStats }}" as="st" hint-placeholder-count="4">
          <div style="padding:var(--sp-lg);border-radius:var(--r-md);border:1px solid var(--border);background:var(--surface);text-align:center;">
            <div style="font-family:var(--font-display);font-weight:700;font-size:var(--fs-xxl);{{ st.color }}">{{ st.value }}</div>
            <div class="metric__label">{{ st.label }}</div>
          </div>
        </sc-for>
      </div>

      <!-- shareable story card -->
      <div class="sec" style="padding:0 0 var(--sp-md);"><div class="sec__title">Share your {{ wr.badge }}</div></div>
      <div style="display:flex;gap:var(--sp-xl);flex-wrap:wrap;align-items:flex-start;">
        <div style="width:280px;max-width:100%;aspect-ratio:9/16;border-radius:var(--r-xl);border:1px solid var(--border-strong);background:linear-gradient(160deg,#2b1c4d,#0d3b52 55%,#143a22);padding:var(--sp-xl);display:flex;flex-direction:column;position:relative;overflow:hidden;flex:0 0 auto;">
          <div style="position:absolute;width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,rgba(226,77,255,0.4),transparent 62%);top:-80px;right:-60px;filter:blur(24px);pointer-events:none;"></div>
          <div style="position:relative;font-family:var(--font-display);font-weight:800;font-size:14px;letter-spacing:var(--tr-tight);color:var(--text);display:inline-flex;align-items:center;gap:7px;"><span style="width:12px;height:12px;border-radius:50% 50% 50% 2px;transform:rotate(45deg);background:var(--grad-glow);box-shadow:var(--shadow-glow);"></span>DROP</div>
          <div style="position:relative;font-size:11px;font-weight:800;letter-spacing:var(--tr-wide);color:var(--accent);margin-top:var(--sp-lg);">{{ wr.badge }}</div>
          <div style="position:relative;font-family:var(--font-display);font-weight:700;font-size:64px;line-height:1;margin-top:6px;background:var(--grad-glow);-webkit-background-clip:text;background-clip:text;color:transparent;">{{ wr.shows }}</div>
          <div style="position:relative;font-size:var(--fs-sm);color:var(--text-secondary);">{{ wr.showsLabel }}</div>
          <div style="position:relative;margin-top:auto;display:flex;flex-direction:column;gap:6px;">
            <div style="display:flex;justify-content:space-between;font-size:var(--fs-sm);"><span style="color:var(--text-muted);">Top artist</span><span style="color:var(--text);font-weight:700;">{{ wr.topArtist }}</span></div>
            <div style="display:flex;justify-content:space-between;font-size:var(--fs-sm);"><span style="color:var(--text-muted);">Top venue</span><span style="color:var(--text);font-weight:700;">{{ wr.topVenue }}</span></div>
            <div style="display:flex;justify-content:space-between;font-size:var(--fs-sm);"><span style="color:var(--text-muted);">Top genre</span><span style="color:var(--text);font-weight:700;">{{ wr.topGenre }}</span></div>
          </div>
        </div>
        <div class="wr-share-actions" style="flex:1;min-width:220px;display:flex;flex-direction:column;gap:var(--sp-md);">
          <p style="color:var(--text-secondary);font-size:var(--fs-sm);line-height:var(--lh-base);margin:0;">Post your {{ wr.badge }} card to your story, or save the image to share anywhere.</p>
          <button type="button" class="btn btn--primary" onClick="{{ wrappedShare }}">↗ Share to story</button>
          <button type="button" class="btn btn--secondary" onClick="{{ wrappedDownload }}">↓ Download image</button>
        </div>
      </div>
      </sc-if>
    </div>
  </main>

  <main class="wiz-main" style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:var(--sp-xxl) var(--sp-xl);position:relative;overflow:hidden;">
    <div style="position:absolute;width:520px;height:520px;border-radius:50%;background:radial-gradient(circle,rgba(226,77,255,0.28),transparent 62%);top:-180px;left:-80px;filter:blur(40px);pointer-events:none;"></div>
    <div style="position:absolute;width:460px;height:460px;border-radius:50%;background:radial-gradient(circle,rgba(77,226,255,0.24),transparent 62%);bottom:-200px;right:-100px;filter:blur(40px);pointer-events:none;"></div>
    <div style="position:relative;width:100%;max-width:520px;">
      <a href="#" onClick="{{ goHome }}" style="display:inline-flex;align-items:center;gap:9px;font-family:var(--font-display);font-weight:800;font-size:20px;letter-spacing:var(--tr-tight);background:var(--grad-chrome);-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:var(--sp-lg);"><span style="width:15px;height:15px;border-radius:50% 50% 50% 2px;transform:rotate(45deg);background:var(--grad-glow);box-shadow:var(--shadow-glow);"></span>DROP</a>

      <sc-if value="{{ claimSubmitted }}">
        <div class="wiz-card" style="background:var(--surface);border:1px solid var(--border-strong);border-radius:var(--r-xl);padding:var(--sp-xxl);box-shadow:var(--shadow-card);text-align:center;">
          <div style="width:72px;height:72px;border-radius:50%;background:var(--grad-glow-fill);box-shadow:var(--shadow-glow);display:flex;align-items:center;justify-content:center;margin:0 auto var(--sp-lg);font-size:32px;color:var(--ink);">✓</div>
          <h1 style="font-family:var(--font-display);font-weight:700;font-size:var(--fs-xxl);letter-spacing:var(--tr-snug);margin:0 0 var(--sp-sm);">Claim submitted</h1>
          <p style="color:var(--text-secondary);margin:0 0 var(--sp-xl);line-height:var(--lh-base);">We'll verify your claim for <b style="color:var(--text);">{{ claimTargetName }}</b> within a few days and email you at <b style="color:var(--text);">{{ claimEmailShown }}</b>. Nothing changes on the profile until it's approved.</p>
          <button type="button" class="btn btn--primary btn--block" onClick="{{ claimDone }}">Back to profile</button>
        </div>
      </sc-if>

      <sc-if value="{{ claimForm }}">
      <div class="wiz-card" style="background:var(--surface);border:1px solid var(--border-strong);border-radius:var(--r-xl);padding:var(--sp-xxl);box-shadow:var(--shadow-card);">
        <div style="font-size:var(--fs-xs);color:var(--accent);font-weight:700;letter-spacing:var(--tr-wide);text-transform:uppercase;margin-bottom:var(--sp-sm);">Step {{ claimStepNum }} of 3 · Claim profile</div>
        <h1 style="font-family:var(--font-display);font-weight:700;font-size:var(--fs-xxl);letter-spacing:var(--tr-snug);margin:0 0 var(--sp-xs);">{{ claimTitle }}</h1>
        <p style="color:var(--text-secondary);margin:0 0 var(--sp-xl);">{{ claimSubtitle }}</p>

        <!-- Step 1: confirm the artist -->
        <sc-if value="{{ claimStep1 }}">
          <sc-if value="{{ claimHasListing }}">
          <button type="button" onClick="{{ claimPickListed }}" style="display:flex;align-items:center;gap:var(--sp-md);width:100%;text-align:left;padding:var(--sp-lg);margin-bottom:var(--sp-md);border-radius:var(--r-md);background:var(--surface-alt);border:1px solid {{ claimListedBorder }};cursor:pointer;">
            <span style="width:52px;height:52px;border-radius:50%;background:var(--grad-brand);flex:0 0 auto;"></span>
            <div style="flex:1;min-width:0;"><div style="font-family:var(--font-display);font-weight:700;font-size:var(--fs-md);color:var(--text);">{{ claimArtistName }}</div><div style="font-size:var(--fs-sm);color:var(--text-secondary);">Yes, this is me — the artist or an authorized manager.</div></div>
            <span style="width:22px;height:22px;border-radius:50%;border:2px solid {{ claimListedDot }};background:{{ claimListedFill }};flex:0 0 auto;"></span>
          </button>
          </sc-if>
          <button type="button" onClick="{{ claimPickNotListed }}" style="display:flex;align-items:center;gap:var(--sp-md);width:100%;text-align:left;padding:var(--sp-lg);border-radius:var(--r-md);background:var(--surface-alt);border:1px solid {{ claimNotListedBorder }};cursor:pointer;">
            <span style="width:52px;height:52px;border-radius:50%;background:var(--surface-hi);display:flex;align-items:center;justify-content:center;flex:0 0 auto;font-size:22px;color:var(--text-muted);">＋</span>
            <div style="flex:1;min-width:0;"><div style="font-family:var(--font-display);font-weight:700;font-size:var(--fs-md);color:var(--text);">My artist isn't listed</div><div style="font-size:var(--fs-sm);color:var(--text-secondary);">Propose a new artist profile.</div></div>
            <span style="width:22px;height:22px;border-radius:50%;border:2px solid {{ claimNotListedDot }};background:{{ claimNotListedFill }};flex:0 0 auto;"></span>
          </button>
          <sc-if value="{{ claimNotListed }}">
            <label style="display:block;font-size:var(--fs-sm);color:var(--text-secondary);margin:var(--sp-lg) 0 6px;">Artist / project name</label>
            <input type="text" value="{{ claimNewName }}" onInput="{{ setClaimNewName }}" placeholder="e.g. your artist name" style="width:100%;height:52px;padding:0 var(--sp-lg);border-radius:var(--r-md);background:var(--surface-alt);border:1px solid var(--border);color:var(--text);font-family:var(--font-body);font-size:var(--fs-md);outline:none;" />
          </sc-if>
        </sc-if>

        <!-- Step 2: evidence -->
        <sc-if value="{{ claimStep2 }}">
          <label style="display:block;font-size:var(--fs-sm);color:var(--text-secondary);margin-bottom:6px;">Official website</label>
          <input type="text" value="{{ claimWebsite }}" onInput="{{ setClaimWebsite }}" placeholder="https://" style="width:100%;height:52px;padding:0 var(--sp-lg);margin-bottom:var(--sp-lg);border-radius:var(--r-md);background:var(--surface-alt);border:1px solid var(--border);color:var(--text);font-family:var(--font-body);font-size:var(--fs-md);outline:none;" />
          <label style="display:block;font-size:var(--fs-sm);color:var(--text-secondary);margin-bottom:6px;">Official social link (Instagram, SoundCloud…)</label>
          <input type="text" value="{{ claimSocial }}" onInput="{{ setClaimSocial }}" placeholder="https://" style="width:100%;height:52px;padding:0 var(--sp-lg);margin-bottom:var(--sp-lg);border-radius:var(--r-md);background:var(--surface-alt);border:1px solid var(--border);color:var(--text);font-family:var(--font-body);font-size:var(--fs-md);outline:none;" />
          <label style="display:block;font-size:var(--fs-sm);color:var(--text-secondary);margin-bottom:6px;">Contact email</label>
          <input type="email" value="{{ claimEmail }}" onInput="{{ setClaimEmail }}" placeholder="you@domain.com" style="width:100%;height:52px;padding:0 var(--sp-lg);border-radius:var(--r-md);background:var(--surface-alt);border:1px solid var(--border);color:var(--text);font-family:var(--font-body);font-size:var(--fs-md);outline:none;" />
          <div style="margin-top:var(--sp-md);font-size:var(--fs-xs);color:var(--text-muted);">Tip: an email on your official domain speeds up verification.</div>
        </sc-if>

        <!-- Step 3: review -->
        <sc-if value="{{ claimStep3 }}">
          <div style="display:flex;flex-direction:column;gap:var(--sp-sm);">
            <div style="display:flex;justify-content:space-between;gap:var(--sp-md);padding:var(--sp-md) var(--sp-lg);background:var(--surface-alt);border:1px solid var(--border);border-radius:var(--r-md);font-size:var(--fs-sm);"><span style="color:var(--text-muted);">Artist</span><span style="color:var(--text);font-weight:600;text-align:right;">{{ claimTargetName }}</span></div>
            <div style="display:flex;justify-content:space-between;gap:var(--sp-md);padding:var(--sp-md) var(--sp-lg);background:var(--surface-alt);border:1px solid var(--border);border-radius:var(--r-md);font-size:var(--fs-sm);"><span style="color:var(--text-muted);">Website</span><span style="color:var(--text);font-weight:600;text-align:right;word-break:break-all;">{{ claimWebsiteShown }}</span></div>
            <div style="display:flex;justify-content:space-between;gap:var(--sp-md);padding:var(--sp-md) var(--sp-lg);background:var(--surface-alt);border:1px solid var(--border);border-radius:var(--r-md);font-size:var(--fs-sm);"><span style="color:var(--text-muted);">Social</span><span style="color:var(--text);font-weight:600;text-align:right;word-break:break-all;">{{ claimSocialShown }}</span></div>
            <div style="display:flex;justify-content:space-between;gap:var(--sp-md);padding:var(--sp-md) var(--sp-lg);background:var(--surface-alt);border:1px solid var(--border);border-radius:var(--r-md);font-size:var(--fs-sm);"><span style="color:var(--text-muted);">Email</span><span style="color:var(--text);font-weight:600;text-align:right;word-break:break-all;">{{ claimEmailReview }}</span></div>
          </div>
          <div style="margin-top:var(--sp-md);font-size:var(--fs-xs);color:var(--text-muted);">By submitting you confirm you're authorized to represent this artist.</div>
        </sc-if>

        <sc-if value="{{ claimError }}">
          <div style="margin-top:var(--sp-lg);padding:var(--sp-md) var(--sp-lg);border-radius:var(--r-md);background:rgba(255,92,114,0.1);border:1px solid var(--danger);color:var(--danger);font-size:var(--fs-sm);">{{ claimError }}</div>
        </sc-if>

        <div class="wiz-foot" style="display:flex;gap:var(--sp-md);margin-top:var(--sp-xxl);align-items:center;">
          <button type="button" class="btn btn--ghost" onClick="{{ claimBack }}" style="flex:0 0 auto;">← Back</button>
          <button type="button" class="btn btn--primary" onClick="{{ claimNext }}" style="flex:1;">{{ claimNextLabel }}</button>
        </div>
      </div>
      </sc-if>
    </div>
  </main>
</sc-if>

<!-- ============ LOG A PAST SHOW ============ -->
<sc-if value="{{ screenLogShow }}">
  <main class="wsh">
    <div style="max-width:640px;margin:0 auto;padding:var(--sp-xxl) var(--sp-xl) var(--sp-xxxl);">
      <a href="#" onClick="{{ goMyShows }}" style="display:inline-flex;align-items:center;gap:6px;color:var(--text-secondary);font-size:var(--fs-sm);margin-bottom:var(--sp-lg);">← Back to My Shows</a>
      <h1 style="font-family:var(--font-display);font-weight:700;font-size:var(--fs-xxl);letter-spacing:var(--tr-snug);margin:0 0 var(--sp-xs);">Log a past show</h1>
      <p style="color:var(--text-secondary);margin:0 0 var(--sp-xl);">Add shows you attended to build your history and Drop Wrapped.</p>

      <!-- ===== Section 1: "I was there" — pick from the archive ===== -->
      <div class="sec" style="padding:0 0 var(--sp-md);"><div class="sec__title">I was there — pick from the archive</div></div>
      <div style="position:relative;margin-bottom:var(--sp-md);">
        <input type="text" value="{{ logQuery }}" onInput="{{ setLogQuery }}" placeholder="Search past shows by artist, venue or title" style="width:100%;height:52px;padding:0 var(--sp-lg) 0 44px;border-radius:var(--r-md);background:var(--surface-alt);border:1px solid var(--border);color:var(--text);font-family:var(--font-body);font-size:var(--fs-md);outline:none;" />
        <span style="position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--text-muted);">⌕</span>
      </div>
      <div class="m-rail" style="display:flex;gap:var(--sp-sm);flex-wrap:wrap;margin-bottom:var(--sp-lg);">
        <sc-for list="{{ logYearChips }}" as="y" hint-placeholder-count="5">
          <button type="button" class="chip {{ y.cls }}" onClick="{{ y.pick }}"><span class="chip__dot"></span>{{ y.label }}</button>
        </sc-for>
      </div>

      <sc-if value="{{ logSearching }}">
        <div style="display:flex;flex-direction:column;gap:var(--sp-sm);margin-bottom:var(--sp-lg);">
          <sc-for list="{{ skelRows }}" as="k" hint-placeholder-count="4">
            <div style="display:flex;gap:var(--sp-md);align-items:center;padding:var(--sp-md);background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);">
              <div class="skel" style="width:22px;height:22px;border-radius:6px;flex:0 0 auto;"></div>
              <div style="flex:1;"><div class="skel" style="height:16px;width:60%;margin-bottom:8px;"></div><div class="skel" style="height:12px;width:40%;"></div></div>
            </div>
          </sc-for>
        </div>
      </sc-if>

      <sc-if value="{{ logResultsEmpty }}">
        <div class="empty" style="margin-bottom:var(--sp-lg);"><div class="empty__ico">🔎</div><div class="empty__title">No past shows found</div><div class="empty__body">Try another search or year — or add it manually below.</div></div>
      </sc-if>

      <div style="display:flex;flex-direction:column;gap:var(--sp-sm);margin-bottom:var(--sp-lg);">
        <sc-for list="{{ logRows }}" as="p" hint-placeholder-count="6">
          <div onClick="{{ p.toggle }}" style="display:flex;align-items:center;gap:var(--sp-md);padding:var(--sp-md);border:1px solid var(--border);border-radius:var(--r-md);cursor:pointer;{{ p.rowStyle }}">
            <span style="width:24px;height:24px;border-radius:6px;border:2px solid var(--border-strong);display:inline-flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex:0 0 auto;{{ p.boxStyle }}">{{ p.check }}</span>
            <div style="flex:1;min-width:0;">
              <div style="font-weight:700;font-size:var(--fs-sm);color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">{{ p.title }}</div>
              <div style="font-size:var(--fs-xs);color:var(--text-muted);">{{ p.dateShort }} · {{ p.venueCity }}</div>
            </div>
          </div>
        </sc-for>
      </div>

      <sc-if value="{{ logHasSelected }}">
        <div style="position:sticky;bottom:0;z-index:30;padding:var(--sp-md) 0;background:linear-gradient(180deg,transparent,var(--bg) 40%);">
          <button type="button" class="btn btn--primary btn--block" onClick="{{ addSelectedShows }}">{{ logAddLabel }}</button>
        </div>
      </sc-if>

      <!-- ===== Section 2: not in the archive? add it manually ===== -->
      <div class="sec" style="padding:var(--sp-xl) 0 var(--sp-md);border-top:1px solid var(--border);margin-top:var(--sp-lg);"><div class="sec__title">Not listed? Add it manually</div></div>

      <label style="display:block;font-size:var(--fs-sm);color:var(--text-secondary);margin-bottom:6px;">Artist / headliner *</label>
      <input type="text" value="{{ logArtist }}" onInput="{{ setLogArtist }}" placeholder="e.g. Flume" style="width:100%;height:52px;padding:0 var(--sp-lg);margin-bottom:var(--sp-lg);border-radius:var(--r-md);background:var(--surface-alt);border:1px solid var(--border);color:var(--text);font-family:var(--font-body);font-size:var(--fs-md);outline:none;" />

      <label style="display:block;font-size:var(--fs-sm);color:var(--text-secondary);margin-bottom:6px;">Venue</label>
      <input type="text" value="{{ logVenue }}" onInput="{{ setLogVenue }}" placeholder="e.g. Red Rocks Amphitheatre" style="width:100%;height:52px;padding:0 var(--sp-lg);margin-bottom:var(--sp-lg);border-radius:var(--r-md);background:var(--surface-alt);border:1px solid var(--border);color:var(--text);font-family:var(--font-body);font-size:var(--fs-md);outline:none;" />

      <div style="display:flex;gap:var(--sp-md);margin-bottom:var(--sp-lg);flex-wrap:wrap;">
        <div style="flex:2;min-width:160px;">
          <label style="display:block;font-size:var(--fs-sm);color:var(--text-secondary);margin-bottom:6px;">City</label>
          <input type="text" value="{{ logCity }}" onInput="{{ setLogCity }}" placeholder="e.g. Morrison" style="width:100%;height:52px;padding:0 var(--sp-lg);border-radius:var(--r-md);background:var(--surface-alt);border:1px solid var(--border);color:var(--text);font-family:var(--font-body);font-size:var(--fs-md);outline:none;" />
        </div>
        <div style="flex:1;min-width:90px;">
          <label style="display:block;font-size:var(--fs-sm);color:var(--text-secondary);margin-bottom:6px;">State</label>
          <input type="text" value="{{ logState }}" onInput="{{ setLogState }}" maxlength="2" placeholder="CO" style="width:100%;height:52px;padding:0 var(--sp-lg);border-radius:var(--r-md);background:var(--surface-alt);border:1px solid var(--border);color:var(--text);font-family:var(--font-body);font-size:var(--fs-md);outline:none;text-transform:uppercase;" />
        </div>
      </div>

      <label style="display:block;font-size:var(--fs-sm);color:var(--text-secondary);margin-bottom:6px;">Date *</label>
      <input type="date" value="{{ logDate }}" onInput="{{ setLogDate }}" style="width:100%;height:52px;padding:0 var(--sp-lg);margin-bottom:var(--sp-lg);border-radius:var(--r-md);background:var(--surface-alt);border:1px solid var(--border);color:var(--text);font-family:var(--font-body);font-size:var(--fs-md);outline:none;color-scheme:dark;" />

      <label style="display:block;font-size:var(--fs-sm);color:var(--text-secondary);margin-bottom:6px;">Notes</label>
      <textarea id="log-notes" placeholder="Anything you want to remember about the night (optional)" style="width:100%;min-height:88px;padding:var(--sp-md) var(--sp-lg);margin-bottom:var(--sp-xl);border-radius:var(--r-md);background:var(--surface-alt);border:1px solid var(--border);color:var(--text);font-family:var(--font-body);font-size:var(--fs-md);outline:none;resize:vertical;"></textarea>

      <button type="button" class="btn btn--primary btn--block" onClick="{{ submitManualLog }}">Add to my history</button>
    </div>
  </main>
</sc-if>

<!-- ============ SHOW MEMORIES ============ -->
<sc-if value="{{ screenMemories }}">
  <main class="wsh">
    <div style="max-width:1000px;margin:0 auto;padding:var(--sp-xxl) var(--sp-xl) var(--sp-xxxl);">
      <div class="wsh__headrow" style="margin-bottom:var(--sp-lg);">
        <div>
          <h1 style="font-family:var(--font-display);font-weight:700;font-size:var(--fs-xxl);letter-spacing:var(--tr-snug);margin:0;">Memories <span class="chip" style="pointer-events:none;">Demo data</span></h1>
          <p style="color:var(--text-secondary);font-size:var(--fs-sm);margin:4px 0 0;">Photos from your nights out. Only you can see these until you post a recap.</p>
        </div>
        <div style="display:flex;gap:var(--sp-sm);">
          <button type="button" class="btn btn--secondary btn--sm" onClick="{{ goLogShow }}">＋ Log a show</button>
          <button type="button" class="btn btn--primary btn--sm" onClick="{{ goRecap }}">Create recap</button>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:var(--sp-md);padding:var(--sp-md) var(--sp-lg);background:var(--social-glass);border:1px solid var(--social-glass-border);border-radius:var(--r-md);margin-bottom:var(--sp-xl);">
        <span style="width:44px;height:44px;border-radius:var(--r-md);flex:0 0 auto;background:linear-gradient(120deg,#2b1c4d,#0d3b52 55%,#143a22);"></span>
        <div style="flex:1;"><div style="font-weight:600;font-size:var(--fs-sm);">ODESZA — The Last Goodbye</div><div style="font-size:var(--fs-xs);color:var(--text-muted);">Jun 20 · Red Rocks Amphitheatre</div></div>
        <span style="font-size:var(--fs-xs);color:var(--text-muted);">Drop photos below ↓</span>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:var(--sp-md);">
        <sc-for list="{{ memorySlots }}" as="m" hint-placeholder-count="6">
          <div style="position:relative;aspect-ratio:1;border-radius:var(--r-md);overflow:hidden;border:1px dashed var(--border-strong);">
            <image-slot id="{{ m.id }}" shape="rect" placeholder="Drop a photo"></image-slot>
          </div>
        </sc-for>
      </div>
    </div>
  </main>
</sc-if>

<!-- ============ POST-SHOW RECAP ============ -->
<sc-if value="{{ screenRecap }}">
  <main style="position:relative;overflow:hidden;min-height:100vh;">
    <div style="position:absolute;width:520px;height:520px;border-radius:50%;background:radial-gradient(circle,rgba(226,77,255,0.2),transparent 62%);top:-180px;right:-80px;filter:blur(40px);pointer-events:none;"></div>
    <div style="position:relative;max-width:900px;margin:0 auto;padding:var(--sp-xl) var(--sp-xl) var(--sp-xxxl);">
      <a href="#" onClick="{{ goMemories }}" style="display:inline-flex;align-items:center;gap:6px;color:var(--text-secondary);font-size:var(--fs-sm);margin-bottom:var(--sp-lg);">← Back to memories</a>

      <!-- Were you there gate -->
      <sc-if value="{{ recapGate }}">
        <div style="max-width:460px;margin:8vh auto 0;text-align:center;">
          <div style="width:120px;height:120px;border-radius:var(--r-xl);margin:0 auto var(--sp-lg);background:linear-gradient(120deg,#2b1c4d,#0d3b52 55%,#143a22);"></div>
          <div class="wsc__date">FRI, JUN 20 · RED ROCKS</div>
          <h1 style="font-family:var(--font-display);font-weight:700;font-size:clamp(26px,4vw,38px);letter-spacing:var(--tr-tight);margin:6px 0 var(--sp-xs);">Were you at ODESZA? <span class="chip" style="pointer-events:none;vertical-align:middle;font-size:14px;">Demo data</span></h1>
          <p style="color:var(--text-secondary);margin:0 0 var(--sp-xl);">Confirm you attended to build a recap. Recaps are only for shows you were actually at.</p>
          <div style="display:flex;gap:var(--sp-md);justify-content:center;">
            <button type="button" class="btn btn--primary" onClick="{{ recapYes }}">Yes, I was there</button>
            <button type="button" class="btn btn--ghost" onClick="{{ goMemories }}">Not this one</button>
          </div>
        </div>
      </sc-if>

      <!-- Builder -->
      <sc-if value="{{ recapBuild }}">
        <h1 style="font-family:var(--font-display);font-weight:700;font-size:var(--fs-xxl);letter-spacing:var(--tr-snug);margin:0 0 var(--sp-xl);">Build your recap</h1>
        <div class="m-stack" style="display:grid;grid-template-columns:1fr 320px;gap:var(--sp-xxl);align-items:start;">
          <div>
            <div class="sec__title" style="margin-bottom:var(--sp-sm);">Pick up to 4 photos</div>
            <div style="font-size:var(--fs-xs);color:var(--text-muted);margin-bottom:var(--sp-md);">{{ recapCountLabel }}</div>
            <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:var(--sp-md);">
              <sc-for list="{{ recapSlots }}" as="p" hint-placeholder-count="4">
                <div style="position:relative;aspect-ratio:1;border-radius:var(--r-md);overflow:hidden;border:1px dashed var(--border-strong);">
                  <image-slot id="{{ p.id }}" shape="rect" placeholder="Photo {{ p.n }}"></image-slot>
                </div>
              </sc-for>
            </div>
          </div>
          <!-- 9:16 branded preview -->
          <div style="position:sticky;top:88px;">

<!-- ============ MUSIC TASTE MANAGER ============ -->
<sc-if value="{{ screenTaste }}">
  <main class="wsh">
    <div style="max-width:640px;margin:0 auto;padding:var(--sp-xxl) var(--sp-xl) var(--sp-xxxl);">
      <h1 style="font-family:var(--font-display);font-weight:700;font-size:var(--fs-xxl);letter-spacing:var(--tr-snug);margin:0 0 var(--sp-xs);">Your music taste <span class="chip" style="pointer-events:none;">Demo data</span></h1>
      <p style="color:var(--text-secondary);margin:0 0 var(--sp-xl);">Tell Drop what you listen to and we'll surface the shows worth your night.</p>

      <sc-if value="{{ tasteImport }}">
        <div style="display:flex;align-items:center;gap:var(--sp-md);padding:var(--sp-md) var(--sp-lg);background:rgba(182,255,106,0.10);border:1px solid rgba(182,255,106,0.3);border-radius:var(--r-md);margin-bottom:var(--sp-xl);">
          <span style="color:var(--attended);font-size:20px;">✓</span>
          <span style="flex:1;font-size:var(--fs-sm);"><b>Followed 12 artists</b> from SoundCloud</span>
          <button type="button" onClick="{{ tasteUndo }}" style="background:none;border:0;color:var(--accent);font-family:var(--font-body);font-weight:700;font-size:var(--fs-sm);cursor:pointer;">Undo</button>
        </div>
      </sc-if>

      <div class="sec__title" style="margin-bottom:var(--sp-md);">Import from a provider</div>
      <div style="display:flex;flex-direction:column;gap:var(--sp-sm);margin-bottom:var(--sp-xl);">
        <!-- Manual -->
        <div style="display:flex;align-items:center;gap:var(--sp-md);padding:var(--sp-md) var(--sp-lg);background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);">
          <span style="width:40px;height:40px;border-radius:var(--r-md);flex:0 0 auto;display:flex;align-items:center;justify-content:center;background:var(--surface-hi);font-size:18px;">✎</span>
          <div style="flex:1;"><div style="font-weight:600;font-size:var(--fs-sm);">Manual entry</div><div style="font-size:var(--fs-xs);color:var(--text-muted);">Add genres &amp; artists below by hand</div></div>
          <span style="font-size:11px;font-weight:800;letter-spacing:var(--tr-wide);color:var(--attended);">ACTIVE</span>
        </div>
        <!-- SoundCloud -->
        <div style="display:flex;align-items:center;gap:var(--sp-md);padding:var(--sp-md) var(--sp-lg);background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);">
          <span style="width:40px;height:40px;border-radius:var(--r-md);flex:0 0 auto;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#ff5500,#ff8800);font-size:18px;">☁</span>
          <div style="flex:1;"><div style="font-weight:600;font-size:var(--fs-sm);">SoundCloud</div><div style="font-size:var(--fs-xs);color:var(--text-muted);">{{ scSubLabel }}</div></div>
          <button type="button" class="{{ scBtnCls }}" onClick="{{ scAction }}">{{ scBtnLabel }}</button>
        </div>
        <!-- Apple Music -->
        <div style="display:flex;align-items:center;gap:var(--sp-md);padding:var(--sp-md) var(--sp-lg);background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);opacity:0.75;">
          <span style="width:40px;height:40px;border-radius:var(--r-md);flex:0 0 auto;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#fa2d48,#a744ff);font-size:18px;"></span>
          <div style="flex:1;"><div style="font-weight:600;font-size:var(--fs-sm);">Apple Music</div><div style="font-size:var(--fs-xs);color:var(--text-muted);">Sync your library &amp; heavy rotation</div></div>
          <span style="font-size:10px;font-weight:800;letter-spacing:var(--tr-wide);color:var(--text-secondary);background:var(--surface-hi);padding:5px 10px;border-radius:var(--r-pill);">iOS APP ONLY</span>
        </div>
      </div>

      <!-- Consent explainer (before OAuth) -->
      <sc-if value="{{ tasteConsent }}">
        <div style="padding:var(--sp-lg);background:var(--social-glass);border:1px solid var(--social-glass-border);border-radius:var(--r-md);margin-bottom:var(--sp-xl);">
          <div style="font-family:var(--font-display);font-weight:700;font-size:var(--fs-md);margin-bottom:var(--sp-sm);">Before you connect SoundCloud</div>
          <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:var(--sp-lg);">
            <div style="display:flex;gap:var(--sp-sm);font-size:var(--fs-sm);color:var(--text-secondary);"><span style="color:var(--attended);">✓</span>We read your likes &amp; follows to match you to shows.</div>
            <div style="display:flex;gap:var(--sp-sm);font-size:var(--fs-sm);color:var(--text-secondary);"><span style="color:var(--attended);">✓</span>We never post, message, or change anything on your account.</div>
            <div style="display:flex;gap:var(--sp-sm);font-size:var(--fs-sm);color:var(--text-secondary);"><span style="color:var(--attended);">✓</span>Disconnect anytime — your imported artists stay editable.</div>
          </div>
          <div style="display:flex;gap:var(--sp-sm);">
            <button type="button" class="btn btn--primary btn--sm" onClick="{{ scConfirm }}">Agree &amp; connect</button>
            <button type="button" class="btn btn--ghost btn--sm" onClick="{{ scCancel }}">Cancel</button>
          </div>
        </div>
      </sc-if>

      <div class="sec__title" style="margin-bottom:var(--sp-md);">Genres you're into</div>
      <div style="display:flex;gap:var(--sp-sm);flex-wrap:wrap;margin-bottom:var(--sp-xl);">
        <sc-for list="{{ tasteGenreChips }}" as="g" hint-placeholder-count="6">
          <button type="button" class="chip {{ g.cls }}" onClick="{{ g.toggle }}"><span class="chip__dot"></span>{{ g.name }}</button>
        </sc-for>
      </div>

      <div class="sec" style="padding:0 0 var(--sp-md);">
        <div class="sec__title">Favorite artists</div>
        <span style="font-size:var(--fs-sm);color:{{ tasteCapColor }};">{{ tasteCapLabel }}</span>
      </div>
      <div style="position:relative;margin-bottom:var(--sp-md);">
        <input type="text" value="{{ tasteQuery }}" onInput="{{ setTasteQuery }}" placeholder="Add an artist — e.g. Flume" style="width:100%;height:48px;padding:0 var(--sp-lg) 0 44px;border-radius:var(--r-md);background:var(--surface-alt);border:1px solid var(--border);color:var(--text);font-family:var(--font-body);font-size:var(--fs-md);outline:none;" />
        <span style="position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--text-muted);">⌕</span>
        <sc-if value="{{ tasteQueryOpen }}">
          <div style="position:absolute;top:52px;left:0;right:0;z-index:20;background:var(--surface-hi);border:1px solid var(--border-strong);border-radius:var(--r-md);box-shadow:var(--overlay-shadow);padding:var(--sp-xs);">
            <sc-for list="{{ tasteMatches }}" as="a" hint-placeholder-count="3">
              <button type="button" onClick="{{ a.add }}" style="display:flex;align-items:center;gap:var(--sp-md);width:100%;text-align:left;padding:10px var(--sp-md);border:0;background:none;color:var(--text);font-family:var(--font-body);font-size:var(--fs-sm);border-radius:var(--r-sm);cursor:pointer;"><span style="width:28px;height:28px;border-radius:50%;background:var(--grad-brand);"></span>{{ a.name }}</button>
            </sc-for>
          </div>
        </sc-if>
      </div>
      <div style="display:flex;gap:var(--sp-sm);flex-wrap:wrap;">
        <sc-for list="{{ tasteArtistChips }}" as="a" hint-placeholder-count="3">
          <span style="display:inline-flex;align-items:center;gap:8px;padding:8px var(--sp-md);background:var(--surface-hi);border:1px solid var(--border-strong);border-radius:var(--r-pill);font-size:var(--fs-sm);font-weight:600;">{{ a.name }}<button type="button" onClick="{{ a.remove }}" style="background:none;border:0;color:var(--text-muted);cursor:pointer;font-size:16px;line-height:1;padding:0;">×</button></span>
        </sc-for>
      </div>
    </div>
  </main>
</sc-if>

<!-- ============ SUGGEST AN EVENT ============ -->

<!-- ============ PROMOTER DASHBOARD ============ -->

          <div style="padding:var(--sp-lg);background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);"><div style="font-family:var(--font-display);font-weight:700;font-size:var(--fs-xl);color:var(--accent);">129</div><div style="font-size:var(--fs-xs);color:var(--text-muted);">Code redemptions</div></div>

        <div class="m-stack" style="display:grid;grid-template-columns:repeat(3,1fr);gap:var(--sp-md);margin-top:var(--sp-xl);">
          <div style="padding:var(--sp-lg);background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);"><div style="font-size:22px;margin-bottom:8px;">📣</div><div style="font-weight:700;margin-bottom:4px;">Reach ravers</div><div style="font-size:var(--fs-sm);color:var(--text-secondary);">Surface to fans who follow your genres and artists.</div></div>
          <div style="padding:var(--sp-lg);background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);"><div style="font-size:22px;margin-bottom:8px;">📋</div><div style="font-weight:700;margin-bottom:4px;">Guest lists</div><div style="font-size:var(--fs-sm);color:var(--text-secondary);">Add names with +1s and check people in at the door.</div></div>
          <div style="padding:var(--sp-lg);background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);"><div style="font-size:22px;margin-bottom:8px;">🎟️</div><div style="font-weight:700;margin-bottom:4px;">Presale codes</div><div style="font-size:var(--fs-sm);color:var(--text-secondary);">Create, toggle, and track redemptions in real time.</div></div>
        </div>
      </sc-if>

<!-- ============ PROMOTER EVENT MANAGE ============ -->

    <div style="max-width:760px;margin:0 auto;padding:var(--sp-xxl) var(--sp-xl) var(--sp-xxxl);">
      <a href="#" onClick="{{ goPromoter }}" style="display:inline-flex;align-items:center;gap:6px;color:var(--text-secondary);font-size:var(--fs-sm);margin-bottom:var(--sp-lg);">← Back to dashboard</a>
      <h1 style="font-family:var(--font-display);font-weight:700;font-size:var(--fs-xxl);letter-spacing:var(--tr-snug);margin:0 0 var(--sp-xs);">{{ pm.title }} <span class="chip" style="pointer-events:none;vertical-align:middle;font-size:14px;">Demo data</span></h1>
      <p style="color:var(--text-secondary);margin:0 0 var(--sp-lg);">{{ pm.date }}</p>
      <div class="seg" style="margin-bottom:var(--sp-xl);">
        <sc-for list="{{ promoTabs }}" as="t" hint-placeholder-count="3"><div class="seg__item {{ t.cls }}" onClick="{{ t.pick }}">{{ t.label }}</div></sc-for>
      </div>

      <!-- DETAILS -->
      <sc-if value="{{ promoTabDetails }}">
        <div style="display:flex;flex-direction:column;gap:var(--sp-lg);margin-bottom:var(--sp-xxl);">
          <div><label style="display:block;font-size:var(--fs-sm);color:var(--text-secondary);margin-bottom:6px;">Event title</label><input type="text" value="{{ pm.title }}" style="width:100%;height:48px;padding:0 var(--sp-lg);border-radius:var(--r-md);background:var(--surface-alt);border:1px solid var(--border);color:var(--text);font-family:var(--font-body);font-size:var(--fs-md);outline:none;" /></div>
          <div style="display:flex;gap:var(--sp-md);flex-wrap:wrap;">
            <div style="flex:1;min-width:150px;"><label style="display:block;font-size:var(--fs-sm);color:var(--text-secondary);margin-bottom:6px;">Date</label><input type="date" style="width:100%;height:48px;padding:0 var(--sp-lg);border-radius:var(--r-md);background:var(--surface-alt);border:1px solid var(--border);color:var(--text);font-family:var(--font-body);font-size:var(--fs-md);outline:none;color-scheme:dark;" /></div>
            <div style="flex:1;min-width:150px;"><label style="display:block;font-size:var(--fs-sm);color:var(--text-secondary);margin-bottom:6px;">Doors</label><input type="time" style="width:100%;height:48px;padding:0 var(--sp-lg);border-radius:var(--r-md);background:var(--surface-alt);border:1px solid var(--border);color:var(--text);font-family:var(--font-body);font-size:var(--fs-md);outline:none;color-scheme:dark;" /></div>
          </div>
          <div><label style="display:block;font-size:var(--fs-sm);color:var(--text-secondary);margin-bottom:6px;">Venue</label><input type="text" value="Red Rocks Amphitheatre" style="width:100%;height:48px;padding:0 var(--sp-lg);border-radius:var(--r-md);background:var(--surface-alt);border:1px solid var(--border);color:var(--text);font-family:var(--font-body);font-size:var(--fs-md);outline:none;" /></div>
          <div><label style="display:block;font-size:var(--fs-sm);color:var(--text-secondary);margin-bottom:6px;">Ticket link</label><input type="url" value="https://axs.com/odesza-rr" style="width:100%;height:48px;padding:0 var(--sp-lg);border-radius:var(--r-md);background:var(--surface-alt);border:1px solid var(--border);color:var(--text);font-family:var(--font-body);font-size:var(--fs-md);outline:none;" /></div>
          <button type="button" class="btn btn--primary btn--sm" style="align-self:flex-start;" onClick="{{ promoSaveDetails }}">Save changes</button>
        </div>
        <div style="padding:var(--sp-lg);border:1px solid var(--danger-border);border-radius:var(--r-md);background:rgba(255,77,109,0.06);">
          <div style="font-family:var(--font-display);font-weight:700;color:var(--danger);margin-bottom:6px;">Delete this event</div>
          <p style="font-size:var(--fs-sm);color:var(--text-secondary);margin:0 0 var(--sp-md);">This removes the event, its guest list, and its codes. Type <b>DELETE</b> to confirm.</p>
          <input type="text" value="{{ promoDelConfirm }}" onInput="{{ setPromoDel }}" placeholder="DELETE" style="width:100%;height:44px;padding:0 var(--sp-lg);border-radius:var(--r-md);background:var(--surface-alt);border:1px solid var(--danger-border);color:var(--text);font-family:var(--font-body);font-size:var(--fs-md);outline:none;margin-bottom:var(--sp-md);" />
          <button type="button" class="btn btn--sm" disabled="{{ promoDelDisabled }}" onClick="{{ promoDelete }}" style="background:var(--danger);color:var(--white);opacity:{{ promoDelOpacity }};">Delete event</button>
        </div>
      </sc-if>

      <!-- GUEST LIST -->
      <sc-if value="{{ promoTabGuests }}">
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:var(--sp-md);margin-bottom:var(--sp-xl);">
          <div style="padding:var(--sp-md) var(--sp-lg);background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);text-align:center;"><div style="font-family:var(--font-display);font-weight:700;font-size:var(--fs-lg);">{{ guestTotal }}</div><div style="font-size:var(--fs-xs);color:var(--text-muted);">On list (incl. +1s)</div></div>
          <div style="padding:var(--sp-md) var(--sp-lg);background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);text-align:center;"><div style="font-family:var(--font-display);font-weight:700;font-size:var(--fs-lg);color:var(--attended);">{{ guestCheckedIn }}</div><div style="font-size:var(--fs-xs);color:var(--text-muted);">Checked in</div></div>
          <div style="padding:var(--sp-md) var(--sp-lg);background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);text-align:center;"><div style="font-family:var(--font-display);font-weight:700;font-size:var(--fs-lg);color:var(--gold);">{{ guestPending }}</div><div style="font-size:var(--fs-xs);color:var(--text-muted);">Awaiting door</div></div>
        </div>
        <div style="display:flex;gap:var(--sp-sm);margin-bottom:var(--sp-lg);">
          <input type="text" placeholder="Add guest name" style="flex:1;height:46px;padding:0 var(--sp-lg);border-radius:var(--r-md);background:var(--surface-alt);border:1px solid var(--border);color:var(--text);font-family:var(--font-body);font-size:var(--fs-md);outline:none;" />
          <input type="number" min="0" value="0" style="width:88px;height:46px;padding:0 var(--sp-md);border-radius:var(--r-md);background:var(--surface-alt);border:1px solid var(--border);color:var(--text);font-family:var(--font-body);font-size:var(--fs-md);outline:none;color-scheme:dark;" />
          <button type="button" class="btn btn--primary btn--sm" onClick="{{ promoAddGuest }}">Add</button>
        </div>
        <div style="display:flex;flex-direction:column;gap:var(--sp-sm);">
          <sc-for list="{{ guests }}" as="g" hint-placeholder-count="5">
            <div style="display:flex;align-items:center;gap:var(--sp-md);padding:var(--sp-md) var(--sp-lg);background:{{ g.bg }};border:1px solid var(--border);border-radius:var(--r-md);">
              <span style="width:34px;height:34px;border-radius:50%;background:var(--grad-brand);flex:0 0 auto;"></span>
              <div style="flex:1;"><div style="font-weight:600;font-size:var(--fs-sm);">{{ g.name }}</div><div style="font-size:var(--fs-xs);color:var(--text-muted);">{{ g.plusLabel }}</div></div>
              <button type="button" class="{{ g.btnCls }}" onClick="{{ g.toggle }}">{{ g.btnLabel }}</button>
            </div>
          </sc-for>
        </div>
      </sc-if>

      <!-- CODES -->
      <sc-if value="{{ promoTabCodes }}">
        <div style="display:flex;gap:var(--sp-sm);margin-bottom:var(--sp-lg);">
          <input type="text" placeholder="NEWCODE20" style="flex:1;height:46px;padding:0 var(--sp-lg);border-radius:var(--r-md);background:var(--surface-alt);border:1px solid var(--border);color:var(--text);font-family:var(--font-body);font-size:var(--fs-md);outline:none;text-transform:uppercase;" />
          <button type="button" class="btn btn--primary btn--sm" onClick="{{ promoAddCode }}">Create code</button>
        </div>
        <div style="display:flex;flex-direction:column;gap:var(--sp-sm);">
          <sc-for list="{{ codes }}" as="c" hint-placeholder-count="2">
            <div style="display:flex;align-items:center;gap:var(--sp-md);padding:var(--sp-md) var(--sp-lg);background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);">
              <div style="flex:1;"><div style="font-family:var(--font-display);font-weight:700;font-size:var(--fs-md);letter-spacing:0.05em;">{{ c.code }}</div><div style="font-size:var(--fs-xs);color:var(--text-muted);">{{ c.desc }} · {{ c.usage }}</div></div>
              <label class="sw" style="margin:0;"><input class="sw__input" type="checkbox" role="switch" checked="{{ c.active }}" onChange="{{ c.toggle }}" /><span class="sw__track"><span class="sw__thumb"></span></span></label>
              <button type="button" onClick="{{ c.del }}" style="background:none;border:0;color:var(--text-muted);cursor:pointer;font-size:18px;line-height:1;padding:0 4px;">🗑</button>
            </div>
          </sc-for>
        </div>
      </sc-if>
    </div>
  </main>
</sc-if>

<!-- ============ ADMIN ============ -->
<sc-if value="{{ screenAdmin }}">
  <main class="wsh">
    <div style="max-width:1100px;margin:0 auto;padding:var(--sp-xxl) var(--sp-xl) var(--sp-xxxl);">
      <div style="display:flex;align-items:center;gap:var(--sp-md);margin-bottom:var(--sp-lg);">
        <h1 style="font-family:var(--font-display);font-weight:700;font-size:var(--fs-xxl);letter-spacing:var(--tr-snug);margin:0;">Admin</h1>
        <span style="font-size:10px;font-weight:800;letter-spacing:var(--tr-wide);color:var(--ink);background:var(--gold);padding:4px 10px;border-radius:var(--r-pill);">STAFF ONLY</span>
        <span class="chip" style="pointer-events:none;">Demo data</span>
      </div>
      <div class="seg" style="margin-bottom:var(--sp-xl);">
        <sc-for list="{{ adminTabs }}" as="t" hint-placeholder-count="3"><div class="seg__item {{ t.cls }}" onClick="{{ t.pick }}">{{ t.label }}</div></sc-for>
      </div>

      <!-- REVIEW QUEUE -->
      <sc-if value="{{ adminTabQueue }}">
        <div class="sec" style="padding:0 0 var(--sp-md);"><div class="sec__title">Pending events · {{ queuePending }}</div></div>
        <sc-if value="{{ queueEmpty }}"><div class="empty"><div class="empty__ico">✅</div><div class="empty__title">Queue clear</div><div class="empty__body">No community-suggested events waiting on review.</div></div></sc-if>
        <div style="display:flex;flex-direction:column;gap:var(--sp-sm);">
          <sc-for list="{{ reviewQueue }}" as="r" hint-placeholder-count="4">
            <div style="display:flex;align-items:center;gap:var(--sp-lg);padding:var(--sp-lg);background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);flex-wrap:wrap;">

                <div style="font-family:var(--font-display);font-weight:700;font-size:var(--fs-md);">{{ r.title }}</div>

                <div style="display:flex;gap:var(--sp-md);flex-wrap:wrap;font-size:var(--fs-xs);color:var(--text-muted);"><span>By {{ r.by }} · {{ r.trust }}</span><span>🔗 {{ r.link }}</span></div>
              </div>
              <div style="display:flex;gap:var(--sp-sm);">

      <!-- REPORTS -->
      <sc-if value="{{ adminTabReports }}">
