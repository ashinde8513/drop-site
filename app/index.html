        <div style="display:flex;flex-direction:column;gap:var(--sp-sm);">
          <sc-for list="{{ reports }}" as="r" hint-placeholder-count="3">
            <div style="display:flex;align-items:flex-start;gap:var(--sp-lg);padding:var(--sp-lg);background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);flex-wrap:wrap;">
              <div style="flex:1;min-width:260px;">
                <div style="display:flex;align-items:center;gap:var(--sp-sm);margin-bottom:6px;">
                  <span style="font-size:10px;font-weight:800;letter-spacing:var(--tr-wide);color:var(--text-secondary);background:var(--surface-hi);padding:3px 8px;border-radius:var(--r-pill);">{{ r.kind }}</span>
                  <span style="font-size:10px;font-weight:800;letter-spacing:var(--tr-wide);color:var(--danger);">{{ r.reason }}</span>
                  <span style="font-size:10px;font-weight:800;letter-spacing:var(--tr-wide);padding:3px 8px;border-radius:var(--r-pill);color:{{ r.stColor }};background:{{ r.stBg }};">{{ r.stLabel }}</span>
                </div>
                <div style="font-size:var(--fs-sm);color:var(--text);margin-bottom:4px;">{{ r.excerpt }}</div>
                <div style="font-size:var(--fs-xs);color:var(--text-muted);">{{ r.ctx }} · reported by {{ r.by }}</div>
              </div>
              <div style="display:flex;gap:var(--sp-sm);">
                <button type="button" class="btn btn--ghost btn--sm" onClick="{{ r.dismiss }}">Dismiss</button>
                <button type="button" class="btn btn--secondary btn--sm" onClick="{{ r.reviewed }}">Reviewed</button>
                <button type="button" class="btn btn--sm" onClick="{{ r.action }}" style="background:var(--danger);color:var(--white);">Take action</button>
              </div>
            </div>
          </sc-for>
        </div>
      </sc-if>

      <!-- ANALYTICS -->
      <sc-if value="{{ adminTabAnalytics }}">
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:var(--sp-md);margin-bottom:var(--sp-xl);">
          <div style="padding:var(--sp-lg);background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);"><div style="font-family:var(--font-display);font-weight:700;font-size:var(--fs-xxl);">48,210</div><div style="font-size:var(--fs-sm);color:var(--text-muted);">Total users</div></div>
          <div style="padding:var(--sp-lg);background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);"><div style="font-family:var(--font-display);font-weight:700;font-size:var(--fs-xxl);color:var(--going);">2,140</div><div style="font-size:var(--fs-sm);color:var(--text-muted);">New this week</div></div>
          <div style="padding:var(--sp-lg);background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);"><div style="font-family:var(--font-display);font-weight:700;font-size:var(--fs-xxl);color:var(--accent);">63%</div><div style="font-size:var(--fs-sm);color:var(--text-muted);">Activation rate</div></div>
        </div>
        <div style="padding:var(--sp-xl);background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);margin-bottom:var(--sp-xl);">
          <div class="sec__title" style="margin-bottom:var(--sp-lg);">Signups · last 14 days</div>
          <div style="display:flex;align-items:flex-end;gap:6px;height:160px;">
            <sc-for list="{{ signupBars }}" as="b" hint-placeholder-count="14">
              <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;justify-content:flex-end;height:100%;">
                <div style="width:100%;border-radius:var(--r-sm) var(--r-sm) 0 0;background:var(--grad-cool);height:{{ b.h }};" title="{{ b.value }}"></div>
              </div>
            </sc-for>
          </div>
        </div>
        <div class="m-stack" style="display:grid;grid-template-columns:1.4fr 1fr;gap:var(--sp-xl);align-items:start;flex-wrap:wrap;">
          <div>
            <div class="sec__title" style="margin-bottom:var(--sp-md);">Top events</div>
            <div style="border:1px solid var(--border);border-radius:var(--r-md);overflow:hidden;">
              <div style="display:flex;padding:10px var(--sp-lg);background:var(--surface-hi);font-size:var(--fs-xs);font-weight:700;letter-spacing:var(--tr-wide);color:var(--text-muted);text-transform:uppercase;"><span style="flex:1;">Event</span><span style="width:64px;text-align:right;">Views</span><span style="width:64px;text-align:right;">Going</span><span style="width:64px;text-align:right;">Conv.</span></div>
              <sc-for list="{{ topEvents }}" as="e" hint-placeholder-count="5">
                <div style="display:flex;padding:12px var(--sp-lg);border-top:1px solid var(--border);font-size:var(--fs-sm);align-items:center;"><span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">{{ e.title }}</span><span style="width:64px;text-align:right;color:var(--text-secondary);">{{ e.views }}</span><span style="width:64px;text-align:right;color:var(--going);">{{ e.going }}</span><span style="width:64px;text-align:right;color:var(--accent);">{{ e.conv }}</span></div>
              </sc-for>
            </div>
          </div>
          <div>
            <div class="sec__title" style="margin-bottom:var(--sp-md);">Action counts</div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-sm);">
              <sc-for list="{{ adminActions }}" as="a" hint-placeholder-count="6">
                <div style="padding:var(--sp-md);background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);"><div style="font-family:var(--font-display);font-weight:700;font-size:var(--fs-md);">{{ a.value }}</div><div style="font-size:var(--fs-xs);color:var(--text-muted);">{{ a.label }}</div></div>
              </sc-for>
            </div>
          </div>
        </div>
      </sc-if>
    </div>
  </main>
</sc-if>

<!-- ============ LEGAL ============ -->
<sc-if value="{{ screenLegal }}">
  <main class="wsh">
    <div class="legal-grid" style="max-width:1000px;margin:0 auto;padding:var(--sp-xxl) var(--sp-xl) var(--sp-xxxl);display:grid;grid-template-columns:200px 1fr;gap:var(--sp-xxl);align-items:start;">
      <nav class="legal-nav" style="position:sticky;top:96px;display:flex;flex-direction:column;gap:var(--sp-xs);">
        <button type="button" class="{{ legalPrivacyCls }}" onClick="{{ legalPrivacy }}" style="text-align:left;background:none;border:0;color:inherit;font-family:var(--font-body);font-size:var(--fs-sm);font-weight:700;padding:8px 12px;border-radius:var(--r-sm);cursor:pointer;">Privacy Policy</button>
        <button type="button" class="{{ legalTermsCls }}" onClick="{{ legalTerms }}" style="text-align:left;background:none;border:0;color:inherit;font-family:var(--font-body);font-size:var(--fs-sm);font-weight:700;padding:8px 12px;border-radius:var(--r-sm);cursor:pointer;">Terms of Service</button>
        <div style="height:1px;background:var(--border);margin:var(--sp-sm) 0;"></div>
        <sc-for list="{{ legalSections }}" as="sec" hint-placeholder-count="5">
          <a href="#" onClick="{{ sec.jump }}" style="font-size:var(--fs-sm);color:var(--text-secondary);padding:5px 12px;">{{ sec.label }}</a>
        </sc-for>
      </nav>
      <article style="max-width:640px;">
        <div class="wsc__date">{{ legalKicker }}</div>
        <h1 style="font-family:var(--font-display);font-weight:700;font-size:var(--fs-xxl);letter-spacing:var(--tr-snug);margin:6px 0 var(--sp-xs);">{{ legalTitle }}</h1>
        <p style="color:var(--text-muted);font-size:var(--fs-sm);margin:0 0 var(--sp-xl);">Last updated July 7, 2026</p>
        <sc-for list="{{ legalBody }}" as="p" hint-placeholder-count="6">
          <h2 style="font-family:var(--font-display);font-weight:700;font-size:var(--fs-lg);letter-spacing:var(--tr-snug);margin:var(--sp-xl) 0 var(--sp-sm);">{{ p.h }}</h2>
          <p style="color:var(--text-secondary);line-height:var(--lh-loose);font-size:var(--fs-md);margin:0;">{{ p.t }}</p>
        </sc-for>
      </article>
    </div>
  </main>
</sc-if>

<!-- ============ GENERIC ERROR ============ -->
<sc-if value="{{ screenError }}">
  <main style="min-height:70vh;display:flex;align-items:center;justify-content:center;padding:64px var(--sp-xl);">
    <div class="empty" style="max-width:380px;">
      <div class="empty__ico">⚠️</div>
      <div class="empty__title">Something went wrong</div>
      <div class="empty__body">We couldn't load this right now. Check your connection and try again.</div>
      <button type="button" class="btn btn--primary btn--sm" style="margin-top:var(--sp-sm);" onClick="{{ errorRetry }}">Retry</button>
    </div>
  </main>
</sc-if>

<!-- ============ FOOTER ============ -->
<sc-if value="{{ showNav }}">
  <footer style="border-top:1px solid var(--border);background:var(--surface);">
    <div style="max-width:1440px;margin:0 auto;padding:var(--sp-xxl) var(--sp-xl);">
      <div style="display:flex;flex-wrap:wrap;gap:var(--sp-xxl);margin-bottom:var(--sp-xl);">
        <div style="display:flex;flex-direction:column;gap:8px;min-width:130px;">
          <span style="font-size:var(--fs-xs);color:var(--text-muted);text-transform:uppercase;letter-spacing:var(--tr-wide);">Company</span>
          <a href="#" onClick="{{ goAbout }}" style="color:var(--text-secondary);font-size:var(--fs-sm);">About</a>
          <a href="#" onClick="{{ goGetApp }}" style="color:var(--text-secondary);font-size:var(--fs-sm);">Get the app</a>
          <a href="#" onClick="{{ goPromoters }}" style="color:var(--text-secondary);font-size:var(--fs-sm);">For promoters</a>
          <a href="#" onClick="{{ goLegal }}" style="color:var(--text-secondary);font-size:var(--fs-sm);">Legal</a>
          <a href="#" onClick="{{ goPaywall }}" style="color:var(--text-secondary);font-size:var(--fs-sm);">Drop+</a>
        </div>
        <div style="display:flex;flex-direction:column;gap:8px;min-width:130px;">
          <span style="font-size:var(--fs-xs);color:var(--text-muted);text-transform:uppercase;letter-spacing:var(--tr-wide);">Explore</span>
          <a href="#" onClick="{{ goCity }}" style="color:var(--text-secondary);font-size:var(--fs-sm);">Shows in Denver</a>
          <a href="#" onClick="{{ goGenre }}" style="color:var(--text-secondary);font-size:var(--fs-sm);">Techno near you</a>
          <a href="#" onClick="{{ goVenues }}" style="color:var(--text-secondary);font-size:var(--fs-sm);">Venues</a>
          <a href="#" onClick="{{ goArtists }}" style="color:var(--text-secondary);font-size:var(--fs-sm);">Artists</a>
        </div>
        <div style="display:flex;flex-direction:column;gap:8px;min-width:130px;">
          <span style="font-size:var(--fs-xs);color:var(--text-muted);text-transform:uppercase;letter-spacing:var(--tr-wide);">Shared links</span>
          <a href="#" onClick="{{ goSharePlan }}" style="color:var(--text-secondary);font-size:var(--fs-sm);">Shared plan</a>
          <a href="#" onClick="{{ goShareRecap }}" style="color:var(--text-secondary);font-size:var(--fs-sm);">Shared recap</a>
          <a href="#" onClick="{{ goShareWrapped }}" style="color:var(--text-secondary);font-size:var(--fs-sm);">Shared Wrapped</a>
          <a href="#" onClick="{{ goLink }}" style="color:var(--text-secondary);font-size:var(--fs-sm);">Link hub</a>
        </div>
        <div style="display:flex;flex-direction:column;gap:8px;min-width:130px;">
          <span style="font-size:var(--fs-xs);color:var(--text-muted);text-transform:uppercase;letter-spacing:var(--tr-wide);">More</span>
          <a href="#" onClick="{{ goReferral }}" style="color:var(--text-secondary);font-size:var(--fs-sm);">Referral</a>
          <a href="#" onClick="{{ goSuggest }}" style="color:var(--text-secondary);font-size:var(--fs-sm);">Suggest an event</a>
          <a href="#" onClick="{{ goPromoter }}" style="color:var(--text-secondary);font-size:var(--fs-sm);">Promoter dashboard</a>
          <a href="#" onClick="{{ goAdmin }}" style="color:var(--text-secondary);font-size:var(--fs-sm);">Admin (staff)</a>
          <a href="#" onClick="{{ goVerify }}" style="color:var(--text-secondary);font-size:var(--fs-sm);">Verify email</a>
          <a href="#" onClick="{{ goError }}" style="color:var(--text-secondary);font-size:var(--fs-sm);">Error state</a>
          <a href="#" onClick="{{ go404 }}" style="color:var(--text-secondary);font-size:var(--fs-sm);">404</a>
        </div>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:var(--sp-lg);align-items:center;justify-content:space-between;padding-top:var(--sp-lg);border-top:1px solid var(--border);color:var(--text-muted);font-size:var(--fs-sm);">
        <div style="display:flex;gap:var(--sp-lg);flex-wrap:wrap;">
          <a href="#" onClick="{{ noop }}" style="color:var(--text-secondary);">Instagram</a>
          <a href="#" onClick="{{ noop }}" style="color:var(--text-secondary);">TikTok</a>
          <a href="#" onClick="{{ goLegal }}" style="color:var(--text-secondary);">Privacy</a>
          <a href="#" onClick="{{ goTerms }}" style="color:var(--text-secondary);">Terms</a>
          <span>Drop may earn a commission on ticket links.</span>
        </div>
        <div style="color:var(--text-muted);font-size:var(--fs-xs);">© Resonance Ventures LLC</div>
      </div>
    </div>
  </footer>
</sc-if>

<!-- ============ EDIT LINKS MODAL ============ -->
<sc-if value="{{ editLinksOpen }}">
  <div class="overlay overlay--center" onClick="{{ closeEditLinks }}">
    <div class="modal" onClick="{{ stop }}">
      <div class="modal__title">Edit your links</div>
      <div class="modal__body">These appear on the public {{ editArtistName }} profile.</div>
      <label style="display:block;font-size:var(--fs-sm);color:var(--text-secondary);margin-bottom:6px;">Merch URL</label>
      <input type="text" value="{{ editMerch }}" onInput="{{ setEditMerch }}" placeholder="https://shop.…" style="width:100%;height:48px;padding:0 var(--sp-lg);margin-bottom:var(--sp-lg);border-radius:var(--r-md);background:var(--surface-alt);border:1px solid var(--border);color:var(--text);font-family:var(--font-body);font-size:var(--fs-md);outline:none;" />
      <label style="display:block;font-size:var(--fs-sm);color:var(--text-secondary);margin-bottom:6px;">Website URL</label>
      <input type="text" value="{{ editWebsite }}" onInput="{{ setEditWebsite }}" placeholder="https://…" style="width:100%;height:48px;padding:0 var(--sp-lg);margin-bottom:var(--sp-xl);border-radius:var(--r-md);background:var(--surface-alt);border:1px solid var(--border);color:var(--text);font-family:var(--font-body);font-size:var(--fs-md);outline:none;" />
      <button type="button" class="btn btn--primary btn--block" onClick="{{ saveEditLinks }}">Save links</button>
      <button type="button" class="btn btn--ghost btn--block" style="margin-top:var(--sp-sm);" onClick="{{ closeEditLinks }}">Cancel</button>
    </div>
  </div>
</sc-if>

<!-- ============ LOGIN GATE MODAL ============ -->
<sc-if value="{{ gate }}">
  <div class="overlay overlay--center" onClick="{{ closeGate }}">
    <div class="modal" onClick="{{ stop }}">
      <div style="width:48px;height:48px;border-radius:50%;background:var(--grad-glow-fill);margin:0 auto var(--sp-lg);box-shadow:var(--shadow-glow);"></div>
      <div class="modal__title" style="text-align:center;">{{ gateTitle }}</div>
      <div class="modal__body" style="text-align:center;">Log in or create a free account to RSVP, save shows, comment and build your crew. You'll come right back here.</div>
      <button type="button" class="btn btn--primary btn--block" onClick="{{ goLoginFromGate }}">Log in</button>
      <button type="button" class="btn btn--ghost btn--block" style="margin-top:var(--sp-sm);" onClick="{{ goSignupFromGate }}">Create account</button>
    </div>
  </div>
</sc-if>

<!-- ============ TOAST ============ -->
<sc-if value="{{ toast }}">
  <div style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:80;">
    <div class="toast toast--success"><span class="toast__ico">✓</span><span class="toast__msg">{{ toast }}</span></div>
  </div>
</sc-if>

</div>
</template>
<div id="app"></div>
<script src="/vendor/supabase.js"></script>
<script src="/data.js"></script>
<script src="./app.js"></script>
</body>
</html>
