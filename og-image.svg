<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4DE2FF"/>
      <stop offset="52%" stop-color="#E24DFF"/>
      <stop offset="100%" stop-color="#B6FF6A"/>
    </linearGradient>
    <linearGradient id="chrome" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C9D2DF"/>
      <stop offset="50%" stop-color="#8A93A5"/>
      <stop offset="100%" stop-color="#EDF2F8"/>
    </linearGradient>
    <!-- Glow halos -->
    <radialGradient id="glow-cyan" cx="75%" cy="10%" r="45%">
      <stop offset="0%" stop-color="#4DE2FF" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#4DE2FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-magenta" cx="15%" cy="8%" r="40%">
      <stop offset="0%" stop-color="#E24DFF" stop-opacity="0.17"/>
      <stop offset="100%" stop-color="#E24DFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0B0D12"/>
  <rect width="1200" height="630" fill="url(#glow-cyan)"/>
  <rect width="1200" height="630" fill="url(#glow-magenta)"/>

  <!-- Wordmark: DROP -->
  <text x="600" y="248" font-family="'Space Grotesk', system-ui, sans-serif"
        font-size="140" font-weight="700" letter-spacing="-4"
        text-anchor="middle" fill="url(#chrome)">DROP</text>

  <!-- Tagline -->
  <text x="600" y="312" font-family="'Space Grotesk', system-ui, sans-serif"
        font-size="26" font-weight="500" letter-spacing="6"
        text-anchor="middle" fill="#7C8597">NEVER MISS THE DROP</text>

  <!-- Spectrum bars: clean band below the wordmark, centred (group is 524 wide) -->
  <g transform="translate(338,478)">
    <rect x="0"   y="-72"  width="44" height="72"  rx="6" fill="url(#grad)" opacity="0.55"/>
    <rect x="60"  y="-104" width="44" height="104" rx="6" fill="url(#grad)" opacity="0.65"/>
    <rect x="120" y="-132" width="44" height="132" rx="6" fill="url(#grad)" opacity="0.75"/>
    <rect x="180" y="-118" width="44" height="118" rx="6" fill="url(#grad)" opacity="0.80"/>
    <rect x="240" y="-146" width="44" height="146" rx="6" fill="url(#grad)" opacity="0.90"/>
    <rect x="300" y="-122" width="44" height="122" rx="6" fill="url(#grad)" opacity="0.82"/>
    <rect x="360" y="-140" width="44" height="140" rx="6" fill="url(#grad)" opacity="0.78"/>
    <rect x="420" y="-104" width="44" height="104" rx="6" fill="url(#grad)" opacity="0.68"/>
    <rect x="480" y="-76"  width="44" height="76"  rx="6" fill="url(#grad)" opacity="0.55"/>
    <!-- baseline -->
    <rect x="0" y="1" width="524" height="2" rx="1" fill="url(#grad)" opacity="0.35"/>
  </g>

  <!-- URL badge -->
  <text x="600" y="582" font-family="'Space Grotesk', system-ui, sans-serif"
        font-size="22" font-weight="500" letter-spacing="2"
        text-anchor="middle" fill="#4A5060">trydropapp.com</text>
</svg>
