<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4DE2FF"/>
      <stop offset="52%" stop-color="#E24DFF"/>
      <stop offset="100%" stop-color="#B6FF6A"/>
    </linearGradient>
    <linearGradient id="chrome" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C9D2DF"/>
      <stop offset="50%" stop-color="#8A93A5"/>
      <stop offset="100%" stop-color="#EDF2F8"/>
    </linearGradient>
    <!-- Glow halos -->
    <radialGradient id="glow-cyan" cx="75%" cy="10%" r="45%">
      <stop offset="0%" stop-color="#4DE2FF" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#4DE2FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-magenta" cx="15%" cy="8%" r="40%">
      <stop offset="0%" stop-color="#E24DFF" stop-opacity="0.17"/>
      <stop offset="100%" stop-color="#E24DFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0B0D12"/>
  <rect width="1200" height="630" fill="url(#glow-cyan)"/>
  <rect width="1200" height="630" fill="url(#glow-magenta)"/>

  <!-- Spectrum bars (centred, scaled up) -->
  <g transform="translate(186,390)">
    <!-- 9 bars at varying heights, iridescent fill -->
    <rect x="0"   y="-120" width="44" height="120" rx="6" fill="url(#grad)" opacity="0.55"/>
    <rect x="60"  y="-176" width="44" height="176" rx="6" fill="url(#grad)" opacity="0.65"/>
    <rect x="120" y="-224" width="44" height="224" rx="6" fill="url(#grad)" opacity="0.75"/>
    <rect x="180" y="-200" width="44" height="200" rx="6" fill="url(#grad)" opacity="0.80"/>
    <rect x="240" y="-248" width="44" height="248" rx="6" fill="url(#grad)" opacity="0.90"/>
    <rect x="300" y="-208" width="44" height="208" rx="6" fill="url(#grad)" opacity="0.82"/>
    <rect x="360" y="-240" width="44" height="240" rx="6" fill="url(#grad)" opacity="0.78"/>
    <rect x="420" y="-176" width="44" height="176" rx="6" fill="url(#grad)" opacity="0.68"/>
    <rect x="480" y="-128" width="44" height="128" rx="6" fill="url(#grad)" opacity="0.55"/>
    <!-- baseline line -->
    <rect x="0" y="1" width="524" height="2" rx="1" fill="url(#grad)" opacity="0.35"/>
  </g>

  <!-- Wordmark: DROP -->
  <text x="600" y="235" font-family="'Space Grotesk', system-ui, sans-serif"
        font-size="148" font-weight="700" letter-spacing="-4"
        text-anchor="middle" fill="url(#chrome)">DROP</text>

  <!-- Tagline -->
  <text x="600" y="295" font-family="'Space Grotesk', system-ui, sans-serif"
        font-size="28" font-weight="500" letter-spacing="4"
        text-anchor="middle" fill="#7C8597" text-transform="uppercase">NEVER MISS THE DROP</text>

  <!-- URL badge -->
  <text x="600" y="580" font-family="'Space Grotesk', system-ui, sans-serif"
        font-size="22" font-weight="500" letter-spacing="2"
        text-anchor="middle" fill="#4A5060">trydropapp.com</text>
</svg>
