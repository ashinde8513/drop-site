<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drop — Event</title>
  <meta name="description" content="See who's going, honest all-in pricing, and get the app. EDM events on Drop." />
  <meta name="theme-color" content="#0B0D12" />

  <!-- Canonical + social. og:* are filled at runtime from the event by event.js. -->
  <link rel="canonical" href="https://trydropapp.com/event" />
  <meta property="og:title" id="og-title" content="Drop — Event" />
  <meta property="og:description" id="og-desc" content="See who's going & plan your crew on Drop." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://trydropapp.com/og-image.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@trydropapp" />

  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Sora:wght@400;600;700&display=swap" rel="stylesheet" />

  <style>
    /* Event-preview-specific layout. Colors/fonts come from styles.css :root. */
    .ev-wrap { max-width: 1120px; margin: 0 auto; padding: 0 24px 64px; }
    .ev-brand { font-family: var(--font-display); font-weight: 700; letter-spacing: 3px; color: var(--text); padding: 20px 0; display: inline-block; }

    .ev-hero {
      position: relative; height: 280px; border-radius: 20px; overflow: hidden;
      background: linear-gradient(150deg, #2A1840, #0F1826); background-size: cover; background-position: center;
      display: flex; align-items: flex-end;
    }
    .ev-hero::before {
      content: ''; position: absolute; inset: 0;
      background:
        radial-gradient(circle at 85% 12%, rgba(226,77,255,0.45), transparent 45%),
        radial-gradient(circle at 8% 40%, rgba(77,226,255,0.35), transparent 45%),
        linear-gradient(180deg, transparent 30%, rgba(11,13,18,0.65) 75%, #0B0D12);
    }
    .ev-hero-inner { position: relative; padding: 28px; }
    .ev-eyebrow { color: var(--brand-lime); font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; font-family: var(--font-body); }
    .ev-title { font-family: var(--font-display); font-weight: 700; font-size: clamp(30px, 6vw, 52px); letter-spacing: -1.5px; color: var(--text); margin: 6px 0 4px; }
    .ev-venue { color: var(--text-secondary); font-size: 16px; font-family: var(--font-body); }

    .ev-body { display: grid; grid-template-columns: 1fr 320px; gap: 32px; margin-top: 28px; align-items: start; }
    @media (max-width: 820px) { .ev-body { grid-template-columns: 1fr; } .ev-ticket { position: static !important; } }

    .ev-proof {
      display: flex; align-items: center; gap: 12px;
      background: rgba(77,226,255,0.10); border: 1px solid rgba(77,226,255,0.28);
      border-radius: 16px; padding: 14px 16px; color: var(--text); font-family: var(--font-body); font-size: 15px;
    }
    .proof-name { color: var(--brand-cyan); font-weight: 700; }

    .ev-section-label { color: var(--text-secondary); font-size: 12px; letter-spacing: 1px; text-transform: uppercase; font-family: var(--font-body); margin: 28px 0 10px; }
    .ev-lineup { display: flex; flex-wrap: wrap; gap: 8px; }
    .ev-pill { background: var(--surface-alt); border: 1px solid var(--border); color: var(--text); border-radius: 999px; padding: 8px 14px; font-size: 14px; font-family: var(--font-body); }
    .ev-pill.dim { color: var(--text-secondary); }
    .ev-about { color: var(--text-secondary); font-size: 15px; line-height: 1.6; max-width: 520px; font-family: var(--font-body); }

    .ev-ticket { position: sticky; top: 24px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 22px; }
    .ev-ticket-eyebrow { color: var(--brand-lime); font-size: 13px; font-weight: 700; letter-spacing: 1px; font-family: var(--font-body); }
    .ev-price-row { display: flex; align-items: baseline; gap: 8px; margin: 10px 0 16px; }
    .ev-price { font-family: var(--font-display); font-weight: 700; font-size: 38px; color: var(--text); }
    .ev-from { color: var(--text-secondary); font-size: 14px; font-family: var(--font-body); }
    .ev-line { display: flex; justify-content: space-between; padding: 10px 0; border-top: 1px solid var(--border); color: var(--text-secondary); font-size: 14px; font-family: var(--font-body); }
    .ev-line span:last-child { color: var(--text); }
    .ev-cta {
      display: block; text-align: center; margin-top: 16px; padding: 15px; border-radius: 14px;
      background: var(--grad-glow); color: #0B0D12; font-family: var(--font-display); font-weight: 700; font-size: 16px; text-decoration: none;
    }
    .ev-stores { display: flex; gap: 10px; margin-top: 10px; }
    .ev-store { flex: 1; text-align: center; padding: 12px; border-radius: 12px; border: 1px solid var(--border-strong); color: var(--text); font-size: 14px; font-family: var(--font-body); text-decoration: none; }
    .ev-foot { color: var(--text-secondary); font-size: 12px; text-align: center; margin-top: 12px; font-family: var(--font-body); }

    .ev-unavailable { text-align: center; padding: 80px 24px; color: var(--text-secondary); font-family: var(--font-body); }
    .ev-unavailable h1 { color: var(--text); font-family: var(--font-display); }
  </style>
</head>
<body>
  <div class="ev-wrap">
    <a class="ev-brand" href="/">DROP</a>

    <!-- Unavailable fallback (missing / unpublished event). Shown by event.js. -->
    <div class="ev-unavailable" id="ev-unavailable" hidden>
      <h1>This show isn't available</h1>
      <p>The link may be old, or the event isn't public yet. <a href="/" style="color:var(--brand-cyan)">Explore Drop →</a></p>
    </div>

    <main id="ev-main">
      <div class="ev-hero" id="ev-hero">
        <div class="ev-hero-inner">
          <div class="ev-eyebrow" id="ev-eyebrow"></div>
          <h1 class="ev-title" id="ev-title">Loading…</h1>
          <div class="ev-venue" id="ev-venue"></div>
        </div>
      </div>

      <div class="ev-body">
        <div>
          <div class="ev-proof" id="ev-proof" hidden></div>

          <div class="ev-section-label">Lineup</div>
          <div class="ev-lineup" id="ev-lineup"></div>

          <div class="ev-section-label">About</div>
          <p class="ev-about" id="ev-about"></p>
        </div>

        <aside class="ev-ticket" id="ev-ticket" hidden>
          <div class="ev-ticket-eyebrow">ALL-IN PRICE · NO HIDDEN FEES</div>
          <div class="ev-price-row">
            <span class="ev-price" id="ev-price">—</span>
            <span class="ev-from">from</span>
          </div>
          <div class="ev-line"><span>Face value</span><span id="ev-facevalue">—</span></div>
          <div class="ev-line"><span>Fees &amp; tax (shown upfront)</span><span id="ev-fees">—</span></div>
          <a class="ev-cta" id="ev-open" href="/">Open in Drop</a>
          <div class="ev-stores">
            <a class="ev-store" id="ev-appstore" href="https://apps.apple.com/app/id0000000000">App Store</a>
            <a class="ev-store" id="ev-googleplay" href="https://play.google.com/store/apps/details?id=app.drop.mobile">▶ Google Play</a>
          </div>
          <div class="ev-foot">See who's going &amp; plan your crew in the app</div>
        </aside>
      </div>
    </main>
  </div>

  <script type="module" src="event.js"></script>
</body>
</html>
