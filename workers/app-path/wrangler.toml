name = "drop-app-path"
main = "worker.js"
compatibility_date = "2026-07-01"

# Both routes live on the trydropapp.com zone. Workers routes intercept ahead of
# the Pages custom domains (both hosts are proxied CNAMEs to *.pages.dev).
routes = [
  { pattern = "trydropapp.com/app*", zone_name = "trydropapp.com" },
  { pattern = "app.trydropapp.com/*", zone_name = "trydropapp.com" },
]
